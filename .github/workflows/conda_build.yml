name: Build and Upload Conda Packages + Conda-Forge Automation

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Package version to build (e.g., 2.1.2)'
        required: true
        type: string

jobs:
  # ═══════════════════════════════════════════════════════════════════
  # JOB 1: Wait for PyPI and get SHA256
  # ═══════════════════════════════════════════════════════════════════
  wait-for-pypi:
    runs-on: ubuntu-latest
    timeout-minutes: 1440
    outputs:
      version: ${{ steps.get-version.outputs.version }}
      sha256: ${{ steps.get-sha.outputs.sha256 }}
    steps:
    - name: Get version from release or input
      id: get-version
      run: |
        if [ "${{ github.event_name }}" == "release" ]; then
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
        else
          VERSION="${{ github.event.inputs.version }}"
          VERSION="${VERSION#v}"
        fi
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "🔍 Target version: $VERSION"
      
    - name: Wait for PyPI and extract SHA256
      id: get-sha
      run: |
        VERSION="${{ steps.get-version.outputs.version }}"
        
        echo "⏳ Waiting for omnipkg $VERSION on PyPI..."
        
        ATTEMPT=0
        while true; do
          ATTEMPT=$((ATTEMPT + 1))
          ELAPSED=$((ATTEMPT * 2))
          
          if [ $((ATTEMPT % 30)) -eq 0 ]; then
            echo "🕐 Still waiting... ${ELAPSED} minutes elapsed"
          fi
          
          HTTP_CODE=$(curl -s -o pypi_response.json -w "%{http_code}" \
            "https://pypi.org/pypi/omnipkg/$VERSION/json")
          
          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ Package found on PyPI!"
            
            SHA256=$(jq -r '.urls[] | select(.filename | endswith(".tar.gz")) | .digests.sha256' pypi_response.json)
            
            if [ -n "$SHA256" ] && [ "$SHA256" != "null" ]; then
              echo "✅ SHA256 extracted from PyPI: $SHA256"
              echo "sha256=$SHA256" >> $GITHUB_OUTPUT
              break
            else
              echo "⚠️  SHA256 not found in response, retrying..."
            fi
          fi
          
          sleep 120
        done
        
        rm -f pypi_response.json

  # ═══════════════════════════════════════════════════════════════════
  # JOB 2: Update local templates in main repo via PR
  # ═══════════════════════════════════════════════════════════════════
  update-local-templates:
    needs: wait-for-pypi
    runs-on: ubuntu-latest
    outputs:
      pr_branch: ${{ steps.create-pr.outputs.pr_branch }}
    steps:
    - name: Checkout omnipkg repo
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        ref: main
        fetch-depth: 0

    - name: Update both meta.yaml templates
      id: update-templates
      run: |
        VERSION="${{ needs.wait-for-pypi.outputs.version }}"
        SHA256="${{ needs.wait-for-pypi.outputs.sha256 }}"
        
        echo "📝 Updating meta-noarch.yaml"
        sed -i "s/{% set version = \".*\" %}/{% set version = \"$VERSION\" %}/" src/omnipkg/conda-recipes/meta-noarch.yaml
        sed -i "s/sha256: .*/sha256: $SHA256/" src/omnipkg/conda-recipes/meta-noarch.yaml
        
        echo "📝 Updating meta-platforms.yaml"
        sed -i "s/{% set version = \".*\" %}/{% set version = \"$VERSION\" %}/" src/omnipkg/conda-recipes/meta-platforms.yaml
        sed -i "s/sha256: .*/sha256: $SHA256/" src/omnipkg/conda-recipes/meta-platforms.yaml
        
        echo "✅ Templates updated"
        
    - name: Create PR with template updates
      id: create-pr
      run: |
        VERSION="${{ needs.wait-for-pypi.outputs.version }}"
        BRANCH="auto-update-conda-meta-$VERSION"
        
        git checkout -b "$BRANCH"
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add src/omnipkg/conda-recipes/meta-noarch.yaml src/omnipkg/conda-recipes/meta-platforms.yaml
        
        if git diff --staged --quiet; then
          echo "ℹ️  No changes to commit"
          echo "pr_branch=" >> $GITHUB_OUTPUT
        else
          git commit -m "chore: update conda meta files to version $VERSION"
          git push -f origin "$BRANCH"
          
          gh pr create \
            --title "chore: update conda meta files to version $VERSION" \
            --body "Automated update from release workflow" \
            --base main \
            --head "$BRANCH" || echo "ℹ️  PR already exists"
          
          echo "✅ Branch updated"
          echo "pr_branch=$BRANCH" >> $GITHUB_OUTPUT
          
        fi
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ═══════════════════════════════════════════════════════════════════
  # JOB 3: Conda-Forge NOARCH (Build 0)
  # ═══════════════════════════════════════════════════════════════════
  update-feedstock-noarch:
    name: "🚀 Conda-Forge Noarch (Build 0)"
    needs: [wait-for-pypi, update-local-templates]
    runs-on: ubuntu-latest
    timeout-minutes: 120
    outputs:
      pr_number: ${{ steps.create-pr.outputs.pull-request-number }}
    
    steps:
      - name: Checkout feedstock fork
        uses: actions/checkout@v4
        with:
          repository: 1minds3t/omnipkg-feedstock
          token: ${{ secrets.FEEDSTOCK_TOKEN }}
          path: feedstock
          fetch-depth: 0

      - name: Sync fork with upstream
        run: |
          cd feedstock
          git remote add upstream https://github.com/conda-forge/omnipkg-feedstock.git 2>/dev/null || true
          git fetch upstream
          git checkout main
          git reset --hard upstream/main
          git push -f origin main
          echo "✅ Fork synced and reset to upstream"

      - name: Determine build number
        id: build-number
        run: |
          cd feedstock
          VERSION="${{ needs.wait-for-pypi.outputs.version }}"
          
          CURRENT_VERSION=$(grep -oP '{% set version = "\K[^"]+' recipe/meta.yaml || echo "0.0.0")
          CURRENT_BUILD=$(grep -oP 'number: \K\d+' recipe/meta.yaml || echo "0")
          
          echo "📊 Current feedstock state:"
          echo "   Version: $CURRENT_VERSION"
          echo "   Build: $CURRENT_BUILD"
          echo "   Target Version: $VERSION"
          
          if [ "$CURRENT_VERSION" = "$VERSION" ]; then
            NEW_BUILD=$((CURRENT_BUILD + 1))
            echo "🔄 Version unchanged - incrementing build: $CURRENT_BUILD → $NEW_BUILD"
          else
            NEW_BUILD=0
            echo "🆕 New version detected - resetting to build 0"
          fi
          
          echo "build_number=$NEW_BUILD" >> $GITHUB_OUTPUT
          echo "✅ Will use build number: $NEW_BUILD"

      - name: Checkout main repo templates
        uses: actions/checkout@v4
        with:
          path: main-repo
          ref: ${{ needs.update-local-templates.outputs.pr_branch || 'main' }}

      - name: Update feedstock with NOARCH template
        run: |
          cd feedstock
          VERSION="${{ needs.wait-for-pypi.outputs.version }}"
          SHA256="${{ needs.wait-for-pypi.outputs.sha256 }}"
          BUILD_NUMBER="${{ steps.build-number.outputs.build_number }}"
          
          echo "📝 Copying NOARCH templates"
          
          cp ../main-repo/src/omnipkg/conda-recipes/meta-noarch.yaml recipe/meta.yaml
          cp ../main-repo/src/omnipkg/conda-recipes/conda-forge-noarch.yml conda-forge.yml
          
          sed -i "s/{% set version = \".*\" %}/{% set version = \"$VERSION\" %}/" recipe/meta.yaml
          sed -i "s/sha256: .*/sha256: $SHA256/" recipe/meta.yaml
          sed -i "s/number: .*/number: $BUILD_NUMBER/" recipe/meta.yaml
          
          echo "✅ NOARCH files updated:"
          echo "   Version: $VERSION"
          echo "   SHA256: $SHA256"
          echo "   Build: $BUILD_NUMBER"
          head -25 recipe/meta.yaml
          
      - name: Create branch and commit
        run: |
          cd feedstock
          VERSION="${{ needs.wait-for-pypi.outputs.version }}"
          BRANCH="update-noarch-v$VERSION"
          
          git push origin --delete "$BRANCH" 2>/dev/null || true
          
          git checkout -b "$BRANCH"
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add recipe/meta.yaml conda-forge.yml
          
          if git diff --staged --quiet; then
            echo "ℹ️  No changes to commit"
            echo "skip_pr=true" >> $GITHUB_ENV
          else
            git commit -m "Update omnipkg to $VERSION (noarch)"
            git push -f origin "$BRANCH"
            echo "✅ Changes pushed to branch $BRANCH"
            echo "skip_pr=false" >> $GITHUB_ENV
          fi
          
      - name: Create PR to conda-forge
        id: create-pr
        if: env.skip_pr != 'true'
        env:
          GH_TOKEN: ${{ secrets.FEEDSTOCK_TOKEN }}
        run: |
          cd feedstock
          VERSION="${{ needs.wait-for-pypi.outputs.version }}"
          BRANCH="update-noarch-v$VERSION"
          SHA256="${{ needs.wait-for-pypi.outputs.sha256 }}"
          BUILD_NUMBER="${{ steps.build-number.outputs.build_number }}"
          
          PR_BODY="🤖 Automated update to omnipkg version $VERSION (noarch build)

          **Changes:**
          - ✅ Version: $VERSION
          - ✅ SHA256: $SHA256
          - ✅ Build number: $BUILD_NUMBER
          - ✅ Architecture: noarch
          - ✅ Updated conda-forge.yml for noarch config

          This PR updates the recipe for conda-forge distribution."
          
          PR_URL=$(gh pr create \
            --repo conda-forge/omnipkg-feedstock \
            --base main \
            --head 1minds3t:$BRANCH \
            --title "Update omnipkg to $VERSION (noarch, build $BUILD_NUMBER)" \
            --body "$PR_BODY" || echo "")
          
          if [ -n "$PR_URL" ]; then
            PR_NUMBER=$(echo "$PR_URL" | grep -oP '\d+$')
            echo "✅ PR created: $PR_URL"
          else
            echo "⚠️  PR already exists, finding it..."
            PR_NUMBER=$(gh pr list --repo conda-forge/omnipkg-feedstock --head 1minds3t:$BRANCH --json number --jq '.[0].number')
            echo "✅ Found existing PR #$PR_NUMBER"
          fi
          echo "pull-request-number=$PR_NUMBER" >> $GITHUB_OUTPUT

      - name: Request re-render and wait for bot commit
        if: env.skip_pr != 'true' && steps.create-pr.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ secrets.FEEDSTOCK_TOKEN }}
        run: |
          PR_NUMBER="${{ steps.create-pr.outputs.pull-request-number }}"
          REPO="conda-forge/omnipkg-feedstock"

          wait_for_rerender() {
            # Poll PR commits for a new commit whose message starts with "MNT:"
            # That's the conda-forge-webservices bot re-render commit.
            local MAX_WAIT=600
            local INTERVAL=20
            local ELAPSED=0
            while [ $ELAPSED -lt $MAX_WAIT ]; do
              RENDERED=$(gh pr view $PR_NUMBER \
                --repo $REPO \
                --json commits \
                --jq '[.commits[] | select(.messageHeadline | startswith("MNT:"))] | length')
              if [ "$RENDERED" -gt 0 ]; then
                echo "✅ Re-render commit detected"
                return 0
              fi
              sleep $INTERVAL
              ELAPSED=$((ELAPSED + INTERVAL))
              echo "  ... ${ELAPSED}s — no re-render commit yet"
            done
            return 1
          }

          echo "🔄 Requesting re-render (attempt 1)..."
          gh pr comment $PR_NUMBER --repo $REPO --body "@conda-forge-admin, please rerender"
          if wait_for_rerender; then exit 0; fi

          echo "⚠️  No re-render commit after 10min, retrying once..."
          gh pr comment $PR_NUMBER --repo $REPO --body "@conda-forge-admin, please rerender"
          if wait_for_rerender; then exit 0; fi

          echo "❌ Re-render did not happen after 2 attempts — CI will fail without it"
          exit 1

      - name: Wait for checks
        if: env.skip_pr != 'true'
        env:
          GH_TOKEN: ${{ secrets.FEEDSTOCK_TOKEN }}
        run: |
          PR_NUMBER="${{ steps.create-pr.outputs.pull-request-number }}"
          REPO="conda-forge/omnipkg-feedstock"

          echo "⏳ Waiting for checks to start..."
          sleep 120

          ATTEMPT=0
          MAX_ATTEMPTS=60

          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            ATTEMPT=$((ATTEMPT + 1))

            PENDING=$(gh pr view $PR_NUMBER --repo $REPO \
              --json statusCheckRollup \
              --jq '[.statusCheckRollup[] | select(.status == "IN_PROGRESS" or .status == "PENDING" or .status == "QUEUED")] | length')
            TOTAL=$(gh pr view $PR_NUMBER --repo $REPO \
              --json statusCheckRollup \
              --jq '.statusCheckRollup | length')
            FAILED=$(gh pr view $PR_NUMBER --repo $REPO \
              --json statusCheckRollup \
              --jq '[.statusCheckRollup[] | select(.conclusion == "FAILURE")] | length')

            echo "📊 Attempt $ATTEMPT: $((TOTAL - PENDING))/$TOTAL done, $FAILED failed"

            if [ "$PENDING" -eq 0 ] && [ "$TOTAL" -gt 0 ]; then
              if [ "$FAILED" -gt 0 ]; then
                echo "❌ Some checks failed — leaving PR open for inspection"
                exit 1
              else
                echo "✅ All checks passed!"
                break
              fi
            fi
            sleep 120
          done

      - name: Merge PR
        env:
          GH_TOKEN: ${{ secrets.FEEDSTOCK_TOKEN }}
        run: |
          PR_NUMBER="${{ steps.create-pr.outputs.pull-request-number }}"
          VERSION="${{ needs.wait-for-pypi.outputs.version }}"

          gh pr merge $PR_NUMBER \
            --repo conda-forge/omnipkg-feedstock \
            --squash \
            --subject "Build for $VERSION (noarch)" \
            --body ""

          echo "✅ Noarch build merged!"

  # ═══════════════════════════════════════════════════════════════════
  # JOB 4: Conda-Forge PLATFORMS (Build 1)
  # ═══════════════════════════════════════════════════════════════════
  update-feedstock-platforms:
    name: "🚀 Conda-Forge Platforms (Build 1)"
    needs: [wait-for-pypi, update-local-templates, update-feedstock-noarch]
    runs-on: ubuntu-latest
    timeout-minutes: 180
    
    steps:
      - name: Checkout feedstock fork
        uses: actions/checkout@v4
        with:
          repository: 1minds3t/omnipkg-feedstock
          token: ${{ secrets.FEEDSTOCK_TOKEN }}
          path: feedstock
          fetch-depth: 0

      - name: Sync fork with upstream
        run: |
          cd feedstock
          git remote add upstream https://github.com/conda-forge/omnipkg-feedstock.git 2>/dev/null || true
          git fetch upstream
          git checkout main
          git reset --hard upstream/main
          git push -f origin main
          echo "✅ Fork synced and reset to upstream"

      - name: Determine build number
        id: build-number
        run: |
          cd feedstock
          VERSION="${{ needs.wait-for-pypi.outputs.version }}"
          
          CURRENT_VERSION=$(grep -oP '{% set version = "\K[^"]+' recipe/meta.yaml || echo "0.0.0")
          CURRENT_BUILD=$(grep -oP 'number: \K\d+' recipe/meta.yaml || echo "0")
          
          echo "📊 Current feedstock state:"
          echo "   Version: $CURRENT_VERSION"
          echo "   Build: $CURRENT_BUILD"
          
          if [ "$CURRENT_VERSION" = "$VERSION" ]; then
            NEW_BUILD=$((CURRENT_BUILD + 1))
            echo "🔄 Incrementing build: $CURRENT_BUILD → $NEW_BUILD"
          else
            NEW_BUILD=1
            echo "🆕 New version - starting at build 1 (platforms)"
          fi
          
          echo "build_number=$NEW_BUILD" >> $GITHUB_OUTPUT

      - name: Checkout main repo templates
        uses: actions/checkout@v4
        with:
          path: main-repo
          ref: ${{ needs.update-local-templates.outputs.pr_branch || 'main' }}

      - name: Update feedstock with PLATFORMS template
        run: |
          cd feedstock
          VERSION="${{ needs.wait-for-pypi.outputs.version }}"
          SHA256="${{ needs.wait-for-pypi.outputs.sha256 }}"
          BUILD_NUMBER="${{ steps.build-number.outputs.build_number }}"
          
          echo "📝 Copying PLATFORMS templates"
          
          cp ../main-repo/src/omnipkg/conda-recipes/meta-platforms.yaml recipe/meta.yaml
          cp ../main-repo/src/omnipkg/conda-recipes/conda-forge-platforms.yml conda-forge.yml
          
          sed -i "s/{% set version = \".*\" %}/{% set version = \"$VERSION\" %}/" recipe/meta.yaml
          sed -i "s/sha256: .*/sha256: $SHA256/" recipe/meta.yaml
          sed -i "s/number: .*/number: $BUILD_NUMBER/" recipe/meta.yaml
          
          echo "✅ PLATFORMS files updated (Build $BUILD_NUMBER)"
          head -25 recipe/meta.yaml
          
      - name: Create branch and commit
        run: |
          cd feedstock
          VERSION="${{ needs.wait-for-pypi.outputs.version }}"
          BRANCH="update-platforms-v$VERSION"
          
          git push origin --delete "$BRANCH" 2>/dev/null || true
          
          git checkout -b "$BRANCH"
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add recipe/meta.yaml conda-forge.yml
          
          if git diff --staged --quiet; then
            echo "ℹ️  No changes to commit"
            echo "skip_pr=true" >> $GITHUB_ENV
          else
            git commit -m "Update omnipkg to $VERSION (platforms)"
            git push -f origin "$BRANCH"
            echo "✅ Changes pushed"
            echo "skip_pr=false" >> $GITHUB_ENV
          fi
          
      - name: Create PR to conda-forge
        id: create-pr
        if: env.skip_pr != 'true'
        env:
          GH_TOKEN: ${{ secrets.FEEDSTOCK_TOKEN }}
        run: |
          cd feedstock
          VERSION="${{ needs.wait-for-pypi.outputs.version }}"
          BRANCH="update-platforms-v$VERSION"
          SHA256="${{ needs.wait-for-pypi.outputs.sha256 }}"
          BUILD_NUMBER="${{ steps.build-number.outputs.build_number }}"
          
          PR_BODY="🤖 Automated update to omnipkg version $VERSION (platform builds)

          **Changes:**
          - ✅ Version: $VERSION
          - ✅ SHA256: $SHA256
          - ✅ Build number: $BUILD_NUMBER
          - ✅ Architectures: linux-64, linux-aarch64, linux-ppc64le, osx-64, osx-arm64, win-64
          - ✅ Updated conda-forge.yml for cross-compilation

          This PR updates the recipe for platform-specific builds."
          
          PR_URL=$(gh pr create \
            --repo conda-forge/omnipkg-feedstock \
            --base main \
            --head 1minds3t:$BRANCH \
            --title "Update omnipkg to $VERSION (platforms, build $BUILD_NUMBER)" \
            --body "$PR_BODY" || echo "")
          
          if [ -n "$PR_URL" ]; then
            PR_NUMBER=$(echo "$PR_URL" | grep -oP '\d+$')
            echo "✅ PR created: $PR_URL"
          else
            echo "⚠️  PR already exists, finding it..."
            PR_NUMBER=$(gh pr list --repo conda-forge/omnipkg-feedstock --head 1minds3t:$BRANCH --json number --jq '.[0].number')
            echo "✅ Found existing PR #$PR_NUMBER"
          fi
          echo "pull-request-number=$PR_NUMBER" >> $GITHUB_OUTPUT

      - name: Request re-render and wait for bot commit
        if: env.skip_pr != 'true' && steps.create-pr.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ secrets.FEEDSTOCK_TOKEN }}
        run: |
          PR_NUMBER="${{ steps.create-pr.outputs.pull-request-number }}"
          REPO="conda-forge/omnipkg-feedstock"

          wait_for_rerender() {
            local MAX_WAIT=600
            local INTERVAL=20
            local ELAPSED=0
            while [ $ELAPSED -lt $MAX_WAIT ]; do
              RENDERED=$(gh pr view $PR_NUMBER \
                --repo $REPO \
                --json commits \
                --jq '[.commits[] | select(.messageHeadline | startswith("MNT:"))] | length')
              if [ "$RENDERED" -gt 0 ]; then
                echo "✅ Re-render commit detected"
                return 0
              fi
              sleep $INTERVAL
              ELAPSED=$((ELAPSED + INTERVAL))
              echo "  ... ${ELAPSED}s — no re-render commit yet"
            done
            return 1
          }

          echo "🔄 Requesting re-render (attempt 1)..."
          gh pr comment $PR_NUMBER --repo $REPO --body "@conda-forge-admin, please rerender"
          if wait_for_rerender; then exit 0; fi

          echo "⚠️  No re-render commit after 10min, retrying once..."
          gh pr comment $PR_NUMBER --repo $REPO --body "@conda-forge-admin, please rerender"
          if wait_for_rerender; then exit 0; fi

          echo "❌ Re-render did not happen after 2 attempts — CI will fail without it"
          exit 1

      - name: Wait for checks
        if: env.skip_pr != 'true'
        env:
          GH_TOKEN: ${{ secrets.FEEDSTOCK_TOKEN }}
        run: |
          PR_NUMBER="${{ steps.create-pr.outputs.pull-request-number }}"
          REPO="conda-forge/omnipkg-feedstock"

          echo "⏳ Waiting for checks..."
          sleep 300

          ATTEMPT=0
          MAX_ATTEMPTS=60

          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            ATTEMPT=$((ATTEMPT + 1))

            PENDING=$(gh pr view $PR_NUMBER --repo $REPO \
              --json statusCheckRollup \
              --jq '[.statusCheckRollup[] | select(.status == "IN_PROGRESS" or .status == "PENDING" or .status == "QUEUED")] | length')
            TOTAL=$(gh pr view $PR_NUMBER --repo $REPO \
              --json statusCheckRollup \
              --jq '.statusCheckRollup | length')
            FAILED=$(gh pr view $PR_NUMBER --repo $REPO \
              --json statusCheckRollup \
              --jq '[.statusCheckRollup[] | select(.conclusion == "FAILURE")] | length')

            echo "📊 Check status (Attempt $ATTEMPT): $((TOTAL - PENDING))/$TOTAL completed"

            if [ "$PENDING" -eq 0 ] && [ "$TOTAL" -gt 0 ]; then
              if [ "$FAILED" -gt 0 ]; then
                echo "❌ Some checks failed — leaving PR open for inspection"
                gh pr view $PR_NUMBER --repo $REPO --json statusCheckRollup
                exit 1
              else
                echo "✅ All checks passed!"
                break
              fi
            fi
            sleep 120
          done

      - name: Merge PR
        if: env.skip_pr != 'true' && steps.create-pr.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ secrets.FEEDSTOCK_TOKEN }}
        run: |
          PR_NUMBER="${{ steps.create-pr.outputs.pull-request-number }}"
          VERSION="${{ needs.wait-for-pypi.outputs.version }}"

          gh pr merge $PR_NUMBER \
            --repo conda-forge/omnipkg-feedstock \
            --squash \
            --subject "Build for $VERSION (platforms)" \
            --body ""

          echo "✅ Platforms build merged!"

      - name: Close stale fork PRs
        if: always() && env.skip_pr != 'true'
        env:
          GH_TOKEN: ${{ secrets.FEEDSTOCK_TOKEN }}
        run: |
          VERSION="${{ needs.wait-for-pypi.outputs.version }}"
          for BRANCH in "update-platforms-v$VERSION" "update-noarch-v$VERSION"; do
            PR=$(gh pr list \
              --repo 1minds3t/omnipkg-feedstock \
              --state open \
              --json number,headRefName \
              --jq ".[] | select(.headRefName == \"$BRANCH\") | .number")
            if [ -n "$PR" ]; then
              echo "🗑️  Closing stale fork PR #$PR ($BRANCH)"
              gh pr close $PR \
                --repo 1minds3t/omnipkg-feedstock \
                --comment "Closed automatically after feedstock merge" \
                --delete-branch || true
            fi
          done
          echo "✅ Fork cleanup done"
