name: Update Homebrew Formula

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Package version to update'
        required: true
        type: string

jobs:
  wait-for-publish:
    name: Wait for PyPI Publish to Complete
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.set-version.outputs.version }}
      sha256: ${{ steps.get-pypi-info.outputs.sha256 }}   # optional: we can fetch it here too

    steps:
      - name: Set version
        id: set-version
        run: |
          if [ "${{ github.event_name }}" == "release" ]; then
            VERSION="${{ github.event.release.tag_name }}"
            VERSION="${VERSION#v}"
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "🔖 Using version: $VERSION"

      - name: Wait for Publish to PyPI workflow to succeed
        uses: actions/github-script@v7
        with:
          script: |
            const workflow_id = 'publish.yml';  // <-- CHANGE TO YOUR ACTUAL FILENAME
            const version = '${{ steps.set-version.outputs.version }}';
            const max_wait_minutes = 60;               // Adjust if your builds are very long
            const check_interval = 30000;              // 30 seconds

            console.log(`Waiting for Publish to PyPI workflow for version ${version}...`);

            let iteration = 0;
            const startTime = Date.now();

            while (true) {
              iteration++;
              const elapsed = Math.floor((Date.now() - startTime) / 60000);

              if (elapsed > max_wait_minutes) {
                throw new Error(`Timeout: Publish workflow did not complete after ${max_wait_minutes} minutes`);
              }

              const runs = await github.rest.actions.listWorkflowRuns({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: workflow_id,
                per_page: 10
              });

              // Find the most recent run for this version / tag
              const targetRun = runs.data.workflow_runs.find(run => 
                (run.head_sha === context.sha || 
                 run.head_branch === context.ref || 
                 run.head_branch === version) &&
                run.status === 'completed'
              );

              if (targetRun) {
                console.log(`Found completed run: ${targetRun.id} | Conclusion: ${targetRun.conclusion}`);
                if (targetRun.conclusion === 'success') {
                  console.log('✅ PyPI publish succeeded!');
                  return;
                } else {
                  throw new Error(`❌ PyPI publish failed with conclusion: ${targetRun.conclusion}`);
                }
              }

              console.log(`[${elapsed}m] No completed publish run yet... waiting`);
              await new Promise(resolve => setTimeout(resolve, check_interval));
            }

  update-homebrew:
    name: Update Homebrew Formula
    needs: wait-for-publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main repo (for any scripts if needed)
        uses: actions/checkout@v4

      - name: Wait extra for PyPI propagation (recommended)
        run: |
          echo "⏳ Waiting 90 seconds for PyPI to fully index the sdist..."
          sleep 90

      - name: Get PyPI package info with retry
        run: |
          # (Your existing robust retry + download + SHA256 calculation logic goes here)
          # Keep it exactly as you had — it's good.
          # Just change the URL to use ${{ needs.wait-for-publish.outputs.version }} if you want,
          # but since you already set VERSION in the previous job, you can export it again.

          max_attempts=12
          attempt=1
          VERSION="${{ needs.wait-for-publish.outputs.version }}"
          url="https://pypi.org/packages/source/o/omnipkg/omnipkg-${VERSION}.tar.gz"

          echo "🔍 Fetching sdist for v${VERSION} from $url"

          sleep 30  # initial wait

          while [ $attempt -le $max_attempts ]; do
            echo "Attempt $attempt/$max_attempts..."
            if curl -L --fail --connect-timeout 30 --max-time 300 -o "omnipkg-${VERSION}.tar.gz" "$url"; then
              file_size=$(wc -c < "omnipkg-${VERSION}.tar.gz")
              if [ "$file_size" -gt 5000 ]; then
                echo "✅ Downloaded successfully (${file_size} bytes)"
                break
              fi
            fi
            rm -f "omnipkg-${VERSION}.tar.gz"
            sleep $((30 + attempt * 15))
            attempt=$((attempt + 1))
          done

          if [ ! -f "omnipkg-${VERSION}.tar.gz" ]; then
            echo "❌ Failed to download sdist after retries"
            exit 1
          fi

          SHA256=$(sha256sum "omnipkg-${VERSION}.tar.gz" | cut -d' ' -f1)
          echo "SHA256=$SHA256" >> $GITHUB_ENV
          rm -f "omnipkg-${VERSION}.tar.gz"

      - name: Checkout Homebrew tap
        uses: actions/checkout@v4
        with:
          repository: 1minds3t/homebrew-omnipkg
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update formula (version, url, sha256 + dependencies)
        run: |
          cd homebrew-tap
          # Your existing sed updates + the big Python script that refreshes all resource blocks
          # ... (keep your current "Update main formula" and "Update dependency versions" steps)

      - name: Verify and commit
        run: |
          # Your existing verify + git commit + push logic
          # ...
