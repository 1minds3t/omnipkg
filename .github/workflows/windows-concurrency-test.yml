name: "🚀 Windows - Omnipkg Demo Test (CI - No Redis)"

on:
  push:
    branches: [ development ]
  pull_request:
    branches: [ development ]
  workflow_dispatch:
    inputs:
      code_branch:
        description: 'Branch to checkout and run code from'
        required: false
        default: 'development'

jobs:
  test:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.code_branch || github.ref }}

      - name: Show branch info
        shell: cmd
        run: |
          echo Workflow ref: ${{ github.ref }}
          echo Code branch: ${{ github.event.inputs.code_branch || github.ref }}

      - name: Set up Python (3.11)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Configure UTF-8 encoding and unbuffered output
        shell: pwsh
        run: |
          echo "PYTHONIOENCODING=utf-8" >> $env:GITHUB_ENV
          echo "PYTHONUTF8=1" >> $env:GITHUB_ENV
          echo "PYTHONUNBUFFERED=1" >> $env:GITHUB_ENV
          echo "OMNIPKG_DEBUG=1" >> $env:GITHUB_ENV
          echo "PYTHONDONTWRITEBYTECODE=1" >> $env:GITHUB_ENV

      - name: Install omnipkg
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Discover and Export Omnipkg ENV_ID
        id: env_id_step
        shell: pwsh
        run: |
          $envId = python -c "from omnipkg.config_manager import ConfigManager; cm = ConfigManager(suppress_init_messages=True); print(cm.env_id)"
          echo "OMNIPKG_ENV_ID=$envId" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "Discovered Omnipkg ENV_ID: $envId"

      - name: Pre-start and deeply probe the Daemon
        shell: pwsh
        run: |
          Write-Host "=================================================="
          Write-Host "1. Spawning daemon and waiting for 'Ready' signal..."
          Write-Host "=================================================="
          
          $tempDir = "$env:TEMP\omnipkg"
          if (!(Test-Path $tempDir)) { New-Item -ItemType Directory -Path $tempDir -Force }
          
          $launcherLog = "$tempDir\daemon_launcher_stdout.log"
          # Clear old logs if they exist
          if (Test-Path $launcherLog) { Remove-Item $launcherLog }

          # Launch the daemon in the background
          Start-Process cmd -ArgumentList "/c set OMNIPKG_DEBUG=1 && 8pkg daemon start > $launcherLog 2>&1" -WindowStyle Hidden
          
          Write-Host "⏳ Daemon is initializing (Grounding config/KB)..."
          Write-Host "I will poll the socket every 2 seconds. Timeout: 180s."
          
          $timeout = 180
          $elapsed = 0
          $daemonReady = $false

          while ($elapsed -lt $timeout) {
              # 1. Check if port 5678 is open
              $socket = netstat -ano | findstr ":5678"
              if ($socket) {
                  Write-Host "`n✅ Socket 5678 detected! Daemon is alive."
                  $daemonReady = $true
                  break
              }

              # 2. Tail the launcher log so we can see the "Grounding" progress
              if (Test-Path $launcherLog) {
                  $lastLine = Get-Content $launcherLog -Tail 1
                  if ($lastLine) {
                      Write-Host "`r[Launcher]: $lastLine" -NoNewline
                  }
              }

              Start-Sleep -Seconds 2
              $elapsed += 2
          }

          if (-not $daemonReady) {
              Write-Host "`n❌ TIMEOUT: Daemon failed to start within 180s."
              Write-Host "--- FINAL LAUNCHER LOG ---"
              if (Test-Path $launcherLog) { Get-Content $launcherLog }
              exit 1
          }

          Write-Host "`n=================================================="
          Write-Host "2. Final Verification"
          Write-Host "=================================================="
          python -c "
          import json
          try:
              from omnipkg.isolation.worker_daemon import DaemonClient
              print(f'✅ Connection Test: {json.dumps(DaemonClient().status())}')
          except Exception as e:
              print(f'❌ Connection Test Failed: {e}')
          "

      - name: Run Demo (Option 8 - Quantum Multiverse)
        shell: cmd
        run: omnipkg demo 8 --non-interactive

      # --- UPDATED LOG DUMP STEP ---
      - name: Dump daemon log after demo run 1
        if: always()
        shell: pwsh
        run: |
          $logPath = "$env:TEMP\omnipkg\${{ env.OMNIPKG_ENV_ID }}\omnipkg_daemon.log"
          Write-Host "Searching for log at: $logPath"
          if (Test-Path $logPath) {
            Get-Content $logPath
          } else {
            Write-Host "❌ Log file not found. Listing temp directory contents:"
            Get-ChildItem -Path "$env:TEMP\omnipkg" -Recurse
          }

      - name: Run Demo Again (Verify Caching)
        shell: cmd
        run: omnipkg demo 8 --non-interactive
        continue-on-error: true

      # --- UPDATED LOG DUMP STEP ---
      - name: Dump daemon log after demo run 2
        if: always()
        shell: pwsh
        run: |
          $logPath = "$env:TEMP\omnipkg\${{ env.OMNIPKG_ENV_ID }}\omnipkg_daemon.log"
          Write-Host "Searching for log at: $logPath"
          if (Test-Path $logPath) {
            Get-Content $logPath
          } else {
            Write-Host "❌ Log file not found. Listing temp directory contents:"
            Get-ChildItem -Path "$env:TEMP\omnipkg" -Recurse
          }

      - name: Run Demo Again (Verify Caching)
        shell: cmd
        run: omnipkg demo 8 --non-interactive
        continue-on-error: true

      # --- UPDATED LOG DUMP STEP ---
      - name: Dump daemon log after demo run 3
        if: always()
        shell: pwsh
        run: |
          $logPath = "$env:TEMP\omnipkg\${{ env.OMNIPKG_ENV_ID }}\omnipkg_daemon.log"
          Write-Host "Searching for log at: $logPath"
          if (Test-Path $logPath) {
            Get-Content $logPath
          } else {
            Write-Host "❌ Log file not found. Listing temp directory contents:"
            Get-ChildItem -Path "$env:TEMP\omnipkg" -Recurse
          }
