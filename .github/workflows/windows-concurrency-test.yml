name: "🚀 Windows - Omnipkg Demo Test (CI - No Redis)"

on:
  push:
    branches: [ development ]
  pull_request:
    branches: [ development ]
  workflow_dispatch:
    inputs:
      code_branch:
        description: 'Branch to checkout and run code from'
        required: false
        default: 'development'

jobs:
  test:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.code_branch || github.ref }}

      - name: Show branch info
        shell: cmd
        run: |
          echo Workflow ref: ${{ github.ref }}
          echo Code branch: ${{ github.event.inputs.code_branch || github.ref }}

      - name: Set up Python (3.11)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Configure UTF-8 encoding and unbuffered output
        shell: pwsh
        run: |
          echo "PYTHONIOENCODING=utf-8" >> $env:GITHUB_ENV
          echo "PYTHONUTF8=1" >> $env:GITHUB_ENV
          echo "PYTHONUNBUFFERED=1" >> $env:GITHUB_ENV
          echo "OMNIPKG_DEBUG=1" >> $env:GITHUB_ENV
          echo "PYTHONDONTWRITEBYTECODE=1" >> $env:GITHUB_ENV

      - name: Install omnipkg
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Pre-start and deeply probe the Daemon
        shell: pwsh
        run: |
          Write-Host "=================================================="
          Write-Host "1. Spawning daemon in isolated background process..."
          Write-Host "=================================================="
          # We use -PassThru to ensure we trigger the process start effectively
          $proc = Start-Process -FilePath "8pkg" -ArgumentList "daemon", "start" -WindowStyle Hidden -PassThru
          
          Write-Host "Waiting 12 seconds for daemon to fully initialize..."
          Start-Sleep -Seconds 12
          
          Write-Host "`n=================================================="
          Write-Host "2. Checking Network / Socket bindings (TCP 5678)..."
          Write-Host "=================================================="
          # This proves if the C/Rust layer actually opened the port
          netstat -ano | findstr ":5678"
          
          Write-Host "`n=================================================="
          Write-Host "3. Testing Python Connection & Registry Discovery..."
          Write-Host "=================================================="
          python -c "
          import os, sys, json
          try:
              from omnipkg.isolation.worker_daemon import DaemonClient, DAEMON_LOG_FILE
              client = DaemonClient()
              status = client.status()
              print(f'✅ DAEMON RESPONDED: {json.dumps(status, indent=2)}')
              print(f'DAEMON_LOG_FILE CONSTANT: {DAEMON_LOG_FILE}')
          except Exception as e:
              print(f'❌ DAEMON CONNECTION FAILED: {e}')
          "

          Write-Host "`n=================================================="
          Write-Host "4. Finding and Dumping ALL daemon logs in TEMP..."
          Write-Host "=================================================="
          # The logs wandering into subfolders is a major clue. This finds them all.
          $logFiles = Get-ChildItem -Path "$env:TEMP\omnipkg" -Filter "omnipkg_daemon.log" -Recurse -ErrorAction SilentlyContinue
          
          if ($logFiles.Count -eq 0) {
              Write-Host "❌ Could not find omnipkg_daemon.log anywhere in $env:TEMP\omnipkg"
              Write-Host "Full directory structure of TEMP\omnipkg:"
              Get-ChildItem -Path "$env:TEMP\omnipkg" -Recurse | Select-Object FullName
          } else {
              foreach ($file in $logFiles) {
                  Write-Host "`n--- START OF LOG: $($file.FullName) ---"
                  Get-Content $file.FullName
                  Write-Host "--- END OF LOG ---"
              }
          }
          Write-Host "`n✅ Pre-start diagnostics complete."

      - name: Run Demo (Option 8 - Quantum Multiverse)
        shell: cmd
        run: omnipkg demo 8 --non-interactive

      - name: Dump daemon log after demo run 1
        if: always()
        shell: pwsh
        run: type "$env:TEMP\omnipkg\omnipkg_daemon.log"

      - name: Run Demo Again (Verify Caching)
        shell: cmd
        run: omnipkg demo 8 --non-interactive
        continue-on-error: true

      - name: Dump daemon log after demo run 2
        if: always()
        shell: pwsh
        run: type "$env:TEMP\omnipkg\omnipkg_daemon.log"

      - name: Run Demo Again (Verify Caching)
        shell: cmd
        run: omnipkg demo 8 --non-interactive
        continue-on-error: true

      - name: Dump daemon log after demo run 3
        if: always()
        shell: pwsh
        run: type "$env:TEMP\omnipkg\omnipkg_daemon.log"
