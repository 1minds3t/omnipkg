name: "🚀 Windows - Omnipkg Demo Test (CI - No Redis)"

on:
  push:
    branches: [ development ]
  pull_request:
    branches: [ development ]
  workflow_dispatch:
    inputs:
      code_branch:
        description: 'Branch to checkout and run code from'
        required: false
        default: 'development'

jobs:
  test:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.code_branch || github.ref }}

      - name: Set up Python (3.11)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Configure UTF-8 encoding and unbuffered output
        shell: pwsh
        run: |
          echo "PYTHONIOENCODING=utf-8" >> $env:GITHUB_ENV
          echo "PYTHONUTF8=1" >> $env:GITHUB_ENV
          echo "PYTHONUNBUFFERED=1" >> $env:GITHUB_ENV
          echo "OMNIPKG_DEBUG=1" >> $env:GITHUB_ENV
          echo "PYTHONDONTWRITEBYTECODE=1" >> $env:GITHUB_ENV

      - name: Install omnipkg
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      # --- CRITICAL: Discover the Env ID so we can track logs/pids accurately ---
      - name: Discover Omnipkg ENV_ID
        shell: pwsh
        run: |
          $envId = python -c "from omnipkg.config_manager import ConfigManager; cm = ConfigManager(suppress_init_messages=True); print(cm.env_id)"
          echo "OMNIPKG_ENV_ID=$envId" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "✅ Discovered Omnipkg ENV_ID: $envId"

      - name: Configure omnipkg for non-interactive use
        shell: pwsh
        run: |
          $configDir = "$HOME\.config\omnipkg"
          New-Item -ItemType Directory -Force -Path $configDir | Out-Null
          @{ interactive = $false; auto_confirm = $true } | ConvertTo-Json | Out-File -FilePath "$configDir\config.json" -Encoding utf8
          Write-Host "✅ Omnipkg configured"

      # --- RUN 1 ---
      - name: Run Demo 1 (Quantum Multiverse)
        shell: cmd
        run: omnipkg demo 8 --non-interactive

      - name: Dump daemon log after run 1
        if: always()
        shell: pwsh
        run: |
          Write-Host "📋 Fetching logs for ENV: ${{ env.OMNIPKG_ENV_ID }}"
          python -c "from omnipkg.isolation.worker_daemon import cli_logs; cli_logs()"

      - name: Teardown after run 1
        if: always()
        shell: pwsh
        run: |
          Write-Host "🛑 Stopping daemon and cleaning sockets..."
          python -c "from omnipkg.isolation.worker_daemon import cli_stop; cli_stop()"

      # --- RUN 2 ---
      - name: Run Demo 2 (Verify Caching)
        shell: cmd
        run: omnipkg demo 8 --non-interactive
        continue-on-error: true

      - name: Dump daemon log after run 2
        if: always()
        shell: pwsh
        run: |
          Write-Host "📋 Fetching logs for ENV: ${{ env.OMNIPKG_ENV_ID }}"
          python -c "from omnipkg.isolation.worker_daemon import cli_logs; cli_logs()"

      - name: Teardown after run 2
        if: always()
        shell: pwsh
        run: |
          Write-Host "🛑 Stopping daemon and cleaning sockets..."
          python -c "from omnipkg.isolation.worker_daemon import cli_stop; cli_stop()"

      # --- RUN 3 ---
      - name: Run Demo 3 (Verify Caching)
        shell: cmd
        run: omnipkg demo 8 --non-interactive
        continue-on-error: true

      - name: Dump daemon log after run 3
        if: always()
        shell: pwsh
        run: |
          Write-Host "📋 Fetching logs for ENV: ${{ env.OMNIPKG_ENV_ID }}"
          python -c "from omnipkg.isolation.worker_daemon import cli_logs; cli_logs()"

      - name: Final Teardown
        if: always()
        shell: pwsh
        run: |
          python -c "from omnipkg.isolation.worker_daemon import cli_stop; cli_stop()"
