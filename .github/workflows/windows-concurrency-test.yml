name: "🚀 Windows - Omnipkg Demo Test (CI - No Redis)"

on:
  push:
    branches: [ development ]
  pull_request:
    branches: [ development ]
  workflow_dispatch:
    inputs:
      code_branch:
        description: 'Branch to checkout and run code from'
        required: false
        default: 'development'

jobs:
  test:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.code_branch || github.ref }}

      - name: Show branch info
        shell: cmd
        run: |
          echo Workflow ref: ${{ github.ref }}
          echo Code branch: ${{ github.event.inputs.code_branch || github.ref }}

      - name: Set up Python (3.11)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Configure UTF-8 encoding and unbuffered output
        shell: pwsh
        run: |
          echo "PYTHONIOENCODING=utf-8" >> $env:GITHUB_ENV
          echo "PYTHONUTF8=1" >> $env:GITHUB_ENV
          echo "PYTHONUNBUFFERED=1" >> $env:GITHUB_ENV
          echo "OMNIPKG_DEBUG=1" >> $env:GITHUB_ENV
          echo "PYTHONDONTWRITEBYTECODE=1" >> $env:GITHUB_ENV

      - name: Install omnipkg
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Configure omnipkg for non-interactive use
        shell: pwsh
        run: |
          $configDir = "$HOME\.config\omnipkg"
          New-Item -ItemType Directory -Force -Path $configDir | Out-Null
          @{ interactive = $false; auto_confirm = $true } | ConvertTo-Json | Out-File -FilePath "$configDir\config.json" -Encoding utf8
          Write-Host "✅ Omnipkg configured"

      - name: Pre-start and deeply probe the Daemon
        shell: pwsh
        run: |
          Write-Host "=================================================="
          Write-Host "1. Spawning daemon with FULL OUTPUT CAPTURE..."
          Write-Host "=================================================="
          
          # Create the directory first to ensure redirection doesn't fail
          $tempDir = "$env:TEMP\omnipkg"
          if (!(Test-Path $tempDir)) { New-Item -ItemType Directory -Path $tempDir -Force }
          
          # We use 'cmd /c' to launch and redirect stdout/stderr to a file.
          # This captures the CRASH if 8pkg fails to even start.
          Write-Host "Launching: cmd /c 'set OMNIPKG_DEBUG=1 && 8pkg daemon start > $tempDir\daemon_launcher_stdout.log 2>&1'"
          Start-Process cmd -ArgumentList "/c set OMNIPKG_DEBUG=1 && 8pkg daemon start > $tempDir\daemon_launcher_stdout.log 2>&1" -WindowStyle Hidden
          
          Write-Host "Waiting 15 seconds for daemon to initialize..."
          Start-Sleep -Seconds 15
          
          Write-Host "`n=================================================="
          Write-Host "2. Checking if Launcher crashed (stdout/stderr)..."
          Write-Host "=================================================="
          $launcherLog = "$tempDir\daemon_launcher_stdout.log"
          if (Test-Path $launcherLog) {
              Write-Host "📄 Launcher Output Found:"
              Get-Content $launcherLog
          } else {
              Write-Host "❌ Launcher log NOT found. The process might have failed before it could even write to the file."
          }

          Write-Host "`n=================================================="
          Write-Host "3. Checking Network / Socket bindings (TCP 5678)..."
          Write-Host "=================================================="
          netstat -ano | findstr ":5678"
          
          Write-Host "`n=================================================="
          Write-Host "4. Testing Python Connection & Registry Discovery..."
          Write-Host "=================================================="
          python -c "
          import os, sys, json
          try:
              from omnipkg.isolation.worker_daemon import DaemonClient
              client = DaemonClient()
              status = client.status()
              print(f'✅ DAEMON RESPONDED: {json.dumps(status, indent=2)}')
          except Exception as e:
              print(f'❌ DAEMON CONNECTION FAILED: {e}')
          "

          Write-Host "`n=================================================="
          Write-Host "5. Dumping ALL logs in TEMP (Recursive)..."
          Write-Host "=================================================="
          $logFiles = Get-ChildItem -Path "$env:TEMP\omnipkg" -Filter "omnipkg_daemon.log" -Recurse -ErrorAction SilentlyContinue
          if ($logFiles.Count -eq 0) {
              Write-Host "❌ No daemon logs found. Directory structure:"
              Get-ChildItem -Path "$env:TEMP\omnipkg" -Recurse | Select-Object FullName
          } else {
              foreach ($file in $logFiles) {
                  Write-Host "`n--- LOG: $($file.FullName) ---"
                  Get-Content $file.FullName
              }
          }

      - name: Run Demo (Option 8 - Quantum Multiverse)
        shell: cmd
        run: omnipkg demo 8 --non-interactive

      - name: Dump daemon log after demo run 1
        if: always()
        shell: pwsh
        run: |
          $logFile = Get-ChildItem -Path "$env:TEMP\omnipkg" -Filter "omnipkg_daemon.log" -Recurse | Select-Object -First 1
          if ($logFile) {
              Get-Content $logFile.FullName
          } else {
              Write-Error "Could not find daemon log in $env:TEMP\omnipkg"
          }
          
      # --- ADD THIS TEARDOWN STEP ---
      - name: Force Teardown After Run 2
        if: always()
        shell: pwsh
        run: |
          Write-Host "Forcefully terminating any lingering daemon processes..."
          # Find the PID from the file and kill it. taskkill is robust.
          $pidPath = "$env:TEMP\omnipkg\${{ env.OMNIPKG_ENV_ID }}\omnipkg_daemon.pid"
          if (Test-Path $pidPath) {
            $pid = Get-Content $pidPath
            taskkill /F /PID $pid
          }
          Write-Host "Removing temp directory to ensure clean state for next run..."
          Remove-Item -Path "$env:TEMP\omnipkg\${{ env.OMNIPKG_ENV_ID }}" -Recurse -Force -ErrorAction SilentlyContinue

      - name: Run Demo Again (Verify Caching)
        shell: cmd
        run: omnipkg demo 8 --non-interactive
        continue-on-error: true

      - name: Dump daemon log after demo run 2
        if: always()
        shell: pwsh
        run: type "$env:TEMP\omnipkg\omnipkg_daemon.log"

      # --- ADD THIS TEARDOWN STEP ---
      - name: Force Teardown After Run 2
        if: always()
        shell: pwsh
        run: |
          Write-Host "Forcefully terminating any lingering daemon processes..."
          # Find the PID from the file and kill it. taskkill is robust.
          $pidPath = "$env:TEMP\omnipkg\${{ env.OMNIPKG_ENV_ID }}\omnipkg_daemon.pid"
          if (Test-Path $pidPath) {
            $pid = Get-Content $pidPath
            taskkill /F /PID $pid
          }
          Write-Host "Removing temp directory to ensure clean state for next run..."
          Remove-Item -Path "$env:TEMP\omnipkg\${{ env.OMNIPKG_ENV_ID }}" -Recurse -Force -ErrorAction SilentlyContinue

      - name: Run Demo Again (Verify Caching)
        shell: cmd
        run: omnipkg demo 8 --non-interactive
        continue-on-error: true

      - name: Dump daemon log after demo run 3
        if: always()
        shell: pwsh
        run: type "$env:TEMP\omnipkg\omnipkg_daemon.log"
