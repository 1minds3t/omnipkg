            VERSION=$(git tag --points-at ${{ github.event.workflow_run.head_sha }} | head -1)
          fi
          VERSION=${VERSION#v}
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Resolved version: ${VERSION}"

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            1minds3t/omnipkg
            ghcr.io/1minds3t/omnipkg
          tags: |
            type=raw,value=cuda
            type=raw,value=gpu
            type=raw,value=${{ steps.version.outputs.version }}-cuda

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.cuda
          platforms: linux/amd64
          push: true
