name: Build Multi-Platform Docker Images

on:
  workflow_run:
    workflows: ["Publish to PyPI (Trusted Publishing)"]
    types: [completed]
  workflow_dispatch:
    inputs:
      version_tag:
        description: 'Version tag to publish as (e.g. v2.4.2) - code will be checked out at this tag'
        required: true
        type: string
      force_rebuild:
        description: 'Force rebuild all variants even if tags already exist on Docker Hub'
        required: false
        type: boolean
        default: false

jobs:
  # ═══════════════════════════════════════════════════════════════════
  # BUILD DEBIAN BASE (Most compatible)
  # ═══════════════════════════════════════════════════════════════════
  build-debian:
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
      - name: Checkout code at tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || inputs.version_tag || github.sha }}

      - name: Overlay Dockerfiles from main
        run: |
          git fetch origin main
          git checkout origin/main -- docker/

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: 1minds3t
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version_tag }}"
          else
            git fetch --tags origin
            VERSION=$(git tag --points-at ${{ github.event.workflow_run.head_sha }} | head -1)
          fi
          VERSION=${VERSION#v}
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Resolved version: ${VERSION}"

      - name: Check if tag exists
        id: check
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://hub.docker.com/v2/repositories/1minds3t/omnipkg/tags/${{ steps.version.outputs.version }}-debian")
          if [ "$STATUS" = "200" ] && [ "${{ inputs.force_rebuild }}" != "true" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Tag ${{ steps.version.outputs.version }}-debian already exists, skipping."
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Extract metadata
        id: meta
        if: steps.check.outputs.exists == 'false'
        uses: docker/metadata-action@v5
        with:
          images: |
            1minds3t/omnipkg
            ghcr.io/1minds3t/omnipkg
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=latest
            type=raw,value=debian
            type=raw,value=${{ steps.version.outputs.version }}-debian

      - name: Build and push
        if: steps.check.outputs.exists == 'false'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.debian
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ═══════════════════════════════════════════════════════════════════
  # BUILD ALPINE (Smallest - ~50MB)
  # ═══════════════════════════════════════════════════════════════════
  build-alpine:
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
      - name: Checkout code at tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || inputs.version_tag || github.sha }}

      - name: Overlay Dockerfiles from main
        run: |
          git fetch origin main
          git checkout origin/main -- docker/

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: 1minds3t
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version_tag }}"
          else
            git fetch --tags origin
            VERSION=$(git tag --points-at ${{ github.event.workflow_run.head_sha }} | head -1)
          fi
          VERSION=${VERSION#v}
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Resolved version: ${VERSION}"

      - name: Check if tag exists
        id: check
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://hub.docker.com/v2/repositories/1minds3t/omnipkg/tags/${{ steps.version.outputs.version }}-alpine")
          if [ "$STATUS" = "200" ] && [ "${{ inputs.force_rebuild }}" != "true" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Tag ${{ steps.version.outputs.version }}-alpine already exists, skipping."
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Extract metadata
        id: meta
        if: steps.check.outputs.exists == 'false'
        uses: docker/metadata-action@v5
        with:
          images: |
            1minds3t/omnipkg
            ghcr.io/1minds3t/omnipkg
          tags: |
            type=raw,value=alpine
            type=raw,value=slim
            type=raw,value=${{ steps.version.outputs.version }}-alpine

      - name: Build and push
        if: steps.check.outputs.exists == 'false'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.alpine
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=alpine
          cache-to: type=gha,mode=max,scope=alpine

  # ═══════════════════════════════════════════════════════════════════
  # BUILD UBUNTU VARIANTS (20.04, 22.04, 24.04)
  # ═══════════════════════════════════════════════════════════════════
  build-ubuntu:
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    strategy:
      matrix:
        ubuntu_version: ['20.04', '22.04', '24.04']
    steps:
      - name: Checkout code at tag
        uses: actions/checkout@v4
        with:
