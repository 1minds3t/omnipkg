            VERSION=$(git tag --points-at ${{ github.event.workflow_run.head_sha }} | head -1)
          fi
          VERSION=${VERSION#v}
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Resolved version: ${VERSION}"

      - name: Check if tag exists
        id: check
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://hub.docker.com/v2/repositories/1minds3t/omnipkg/tags/${{ steps.version.outputs.version }}-ubuntu-${{ matrix.ubuntu_version }}")
          if [ "$STATUS" = "200" ] && [ "${{ inputs.force_rebuild }}" != "true" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Tag ${{ steps.version.outputs.version }}-ubuntu-${{ matrix.ubuntu_version }} already exists, skipping."
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Extract metadata
        id: meta
        if: steps.check.outputs.exists == 'false'
        uses: docker/metadata-action@v5
        with:
          images: |
            1minds3t/omnipkg
            ghcr.io/1minds3t/omnipkg
          tags: |
            type=raw,value=ubuntu-${{ matrix.ubuntu_version }}
            type=raw,value=${{ steps.version.outputs.version }}-ubuntu-${{ matrix.ubuntu_version }}

      - name: Build and push
        if: steps.check.outputs.exists == 'false'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.ubuntu
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            UBUNTU_VERSION=${{ matrix.ubuntu_version }}
          cache-from: type=gha,scope=ubuntu-${{ matrix.ubuntu_version }}
          cache-to: type=gha,mode=max,scope=ubuntu-${{ matrix.ubuntu_version }}

  # ═══════════════════════════════════════════════════════════════════
  # BUILD FEDORA/RHEL
  # ═══════════════════════════════════════════════════════════════════
  build-fedora:
