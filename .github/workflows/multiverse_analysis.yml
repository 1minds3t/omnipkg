name: "Omnipkg Multiverse Analysis Test"
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  multiverse-analysis:
    runs-on: ubuntu-latest
    
    # **CRITICAL FIX:** Define a single, consistent config path for the entire job.
    env:
      OMNIPKG_CONFIG_PATH: "${{ github.workspace }}/.omnipkg_config/config.json"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install omnipkg
        run: pip install -e .
      
      # **IMPROVEMENT:** Create a single, clean setup step.
      - name: Initialize Omnipkg and Adopt Interpreters
        run: |
          echo "=== Initializing Omnipkg and preparing all required interpreters ==="
          omnipkg python adopt 3.11
          omnipkg python adopt 3.9
          echo "--- Verifying managed interpreters ---"
          omnipkg info python
          echo "✅ Omnipkg setup complete."
      
      # **IMPROVEMENT:** Run the test script directly. It contains all the logic.
      - name: Run Multiverse Analysis Test
        run: python tests/multiverse_analysis.py
      
      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: multiverse-logs-and-config
          path: |
            ${{ env.OMNIPKG_CONFIG_PATH }}
            ${{ github.workspace }}/multiverse_log.jsonl
          retention-days: 7
