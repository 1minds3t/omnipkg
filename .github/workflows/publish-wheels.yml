name: Build Platform-Specific Wheels (abi3)

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch, tag, or SHA to build (e.g. main, v3.1.1, abc1234)'
        required: false
        default: 'main'
        type: string

permissions:
  contents: write

jobs:
  build-wheels:
    name: "Wheels | ${{ matrix.platform }}"
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── LINUX x86_64 ───────────────────────────────────────────────────
          - { platform: linux_x86_64,   runner: ubuntu-latest,    cibw_archs: x86_64,  use_qemu: false }
          # ── LINUX aarch64 ──────────────────────────────────────────────────
          - { platform: linux_aarch64,  runner: ubuntu-latest,    cibw_archs: aarch64, use_qemu: true  }
          # ── LINUX armv7l ───────────────────────────────────────────────────
          - { platform: linux_armv7,    runner: ubuntu-latest,    cibw_archs: armv7l,  use_qemu: true  }
          # ── LINUX ppc64le ──────────────────────────────────────────────────
          - { platform: linux_ppc64le,  runner: ubuntu-latest,    cibw_archs: ppc64le, use_qemu: true  }
          # ── LINUX s390x ────────────────────────────────────────────────────
          - { platform: linux_s390x,    runner: ubuntu-latest,    cibw_archs: s390x,   use_qemu: true  }
          # ── LINUX i686 ─────────────────────────────────────────────────────
          - { platform: linux_i686,     runner: ubuntu-latest,    cibw_archs: i686,    use_qemu: false }
          # ── LINUX riscv64 ──────────────────────────────────────────────────
          - { platform: linux_riscv64,  runner: ubuntu-latest,    cibw_archs: riscv64, use_qemu: true  }
          # ── macOS x86_64 ───────────────────────────────────────────────────
          - { platform: macos_x86_64,   runner: macos-15-intel,   cibw_archs: x86_64,  use_qemu: false }
          # ── macOS arm64 ────────────────────────────────────────────────────
          - { platform: macos_arm64,    runner: macos-15,         cibw_archs: arm64,   use_qemu: false }
          # ── Windows AMD64 ──────────────────────────────────────────────────
          - { platform: win_amd64,      runner: windows-latest,   cibw_archs: AMD64,   use_qemu: false }
          # ── Windows ARM64 ──────────────────────────────────────────────────
          - { platform: win_arm64,      runner: windows-latest,   cibw_archs: ARM64,   use_qemu: false }
          # ── Windows x86 ────────────────────────────────────────────────────
          - { platform: win32,          runner: windows-latest,   cibw_archs: x86,     use_qemu: false }

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Set up QEMU (Linux cross-arch only)
        if: matrix.use_qemu == true
        uses: docker/setup-qemu-action@v3
        with:
          platforms: all

      # ── Build one abi3 wheel per platform ────────────────────────────────
      - name: Build wheel
        uses: pypa/cibuildwheel@v2.23.0
        env:
          CIBW_ENVIRONMENT: >-
            OMNIPKG_SKIP_C_EXT=0
          CIBW_BUILD_VERBOSITY: 1
          CIBW_BEFORE_BUILD: "pip install packaging>=23.0"
          CIBW_BEFORE_TEST: >-
            pip install --only-binary :all:
            -f exotic-wheels.github.io
            uv-ffi>=0.10.8.post7 cryptography>=46.0.7 psutil cffi
          # Build only cp37 — abi3 wheel covers cp37+ automatically
          CIBW_BUILD: "cp37-*"
          CIBW_ARCHS: "${{ matrix.cibw_archs }}"
          CIBW_TEST_COMMAND: "omnipkg --version"
          # auditwheel: pass through if no ELF (pure wheel) instead of dying
          CIBW_REPAIR_WHEEL_COMMAND_LINUX: >
            auditwheel repair -w {dest_dir} {wheel} ||
            (auditwheel show {wheel} 2>&1 | grep -q 'no ELF' && cp {wheel} {dest_dir})
          CIBW_MANYLINUX_X86_64_IMAGE:   "quay.io/pypa/manylinux2014_x86_64"
          CIBW_MANYLINUX_AARCH64_IMAGE:  "quay.io/pypa/manylinux2014_aarch64"
          CIBW_MANYLINUX_PPC64LE_IMAGE:  "quay.io/pypa/manylinux2014_ppc64le"
          CIBW_MANYLINUX_S390X_IMAGE:    "quay.io/pypa/manylinux2014_s390x"
          # armv7l does not have a manylinux2014 image, use the oldest available modern one that works
          CIBW_MANYLINUX_ARMV7L_IMAGE:   "quay.io/pypa/manylinux_2_24_armv7l"
          CIBW_MUSLLINUX_X86_64_IMAGE:   "quay.io/pypa/musllinux_1_2_x86_64:2025.02.28-1"
          CIBW_MUSLLINUX_AARCH64_IMAGE:  "quay.io/pypa/musllinux_1_2_aarch64:2025.02.28-1"
          CIBW_MUSLLINUX_ARMV7L_IMAGE:   "quay.io/pypa/musllinux_1_2_armv7l:2025.02.28-1"
          CIBW_MUSLLINUX_PPC64LE_IMAGE:  "quay.io/pypa/musllinux_1_2_ppc64le:2025.02.28-1"
          CIBW_MUSLLINUX_S390X_IMAGE:    "quay.io/pypa/musllinux_1_2_s390x:2025.02.28-1"

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.platform }}
          path: ./wheelhouse/*.whl
          if-no-files-found: error

  build-noarch:
    name: "Wheels | noarch | py3-none-any"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Build noarch wheel
        run: |
          pip install build
          OMNIPKG_SKIP_C_EXT=1 python -m build --wheel --outdir wheelhouse/

      - name: Upload noarch wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheels-noarch
          path: ./wheelhouse/*.whl
          if-no-files-found: error

  publish:
    name: "Publish all wheels to PyPI + GH Release"
    needs: [build-wheels, build-noarch]
    runs-on: ubuntu-latest
    environment: pypi
    if: |
      startsWith(inputs.ref, 'v') &&
      !cancelled() &&
      (needs.build-wheels.result == 'success' || needs.build-wheels.result == 'failure') &&
      needs.build-noarch.result == 'success'
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Download all wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist/
          merge-multiple: true

      - name: List wheels to be published
        run: ls -lh dist/

      - name: Upload wheels to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.ref }}
          files: dist/*.whl
          fail_on_unmatched_files: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          skip-existing: true
