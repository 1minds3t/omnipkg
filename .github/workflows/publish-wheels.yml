name: Publish omnipkg (Standard Wheels)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag or branch (e.g. v3.3.1 or development)'
        required: false
        default: 'development'

permissions:
  contents: write
  id-token: write

jobs:
  # ── Linux x86_64 manylinux (cp37-abi3) ──────────────────────────────────
  build-linux-x86_64-glibc:
    name: "linux x86_64 glibc"
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Build + auditwheel
        run: |
          podman run --rm \
            -v /home/minds3t/miniforge3/envs/evocoder_env/.omnipkg/interpreters/cpython-3.7.9:/python37:ro \
            -v ${{ github.workspace }}:/io \
            quay.io/pypa/manylinux2014_x86_64:latest \
            /bin/bash -c "
              /python37/bin/python3 -m pip install build --quiet &&
              cd /io &&
              /python37/bin/python3 -m build --wheel --outdir /io/dist-raw/ &&
              auditwheel repair /io/dist-raw/*.whl -w /io/dist/
            "

      - uses: actions/upload-artifact@v4
        with:
          name: wheel-linux-x86_64-glibc
          path: dist/*.whl

  # ── Linux aarch64 manylinux (cp37-abi3) ─────────────────────────────────
  build-linux-aarch64-glibc:
    name: "linux aarch64 glibc"
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Build + auditwheel
        run: |
          # manylinux2014_aarch64:latest dropped cp37 after CentOS7 EOL (Jun 2024).
          # Pin to last dated tag confirmed to include cp37-cp37m.
          podman run --rm --platform linux/arm64 \
            -v ${{ github.workspace }}:/io \
            quay.io/pypa/manylinux2014_aarch64:2022-07-17-51324db \
            /bin/bash -c "
              set -e
              PY=/opt/python/cp37-cp37m/bin/python3
              \$PY -m pip install build --quiet
              cd /io
              \$PY -m build --wheel --outdir /io/dist-raw/
              auditwheel repair /io/dist-raw/*.whl -w /io/dist/
            "

      - uses: actions/upload-artifact@v4
        with:
          name: wheel-linux-aarch64-glibc
          path: dist/*.whl

  # ── Linux x86_64 musllinux (cp37-abi3) ──────────────────────────────────
  build-linux-x86_64-musl:
    name: "linux x86_64 musl"
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Build + auditwheel
        run: |
          podman run --rm \
            -v /home/minds3t/miniforge3/envs/evocoder_env/.omnipkg/interpreters/cpython-3.7.9:/python37:ro \
            -v ${{ github.workspace }}:/io \
            quay.io/pypa/musllinux_1_2_x86_64:latest \
            /bin/bash -c "
              /python37/bin/python3 -m pip install build --quiet &&
              cd /io &&
              /python37/bin/python3 -m build --wheel --outdir /io/dist-raw/ &&
              auditwheel repair /io/dist-raw/*.whl -w /io/dist/
            "

      - uses: actions/upload-artifact@v4
        with:
          name: wheel-linux-x86_64-musl
          path: dist/*.whl

  # ── Linux aarch64 musllinux (cp38+ only — musllinux never shipped cp37) ───
  build-linux-aarch64-musl:
    name: "linux aarch64 musl"
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Build + auditwheel
        run: |
          # musllinux images never included cp37 — earliest is cp38.
          # Use cp38 here; the wheel will still install fine on py37 if your
          # package declares python_requires correctly and has no C extensions,
          # or ship this as a py38+ musllinux wheel alongside the glibc cp37 one.
          podman run --rm --platform linux/arm64 \
            -v ${{ github.workspace }}:/io \
            quay.io/pypa/musllinux_1_2_aarch64:latest \
            /bin/bash -c "
              set -e
              PY=/opt/python/cp39-cp39/bin/python3
              \$PY -m pip install build --quiet
              cd /io
              \$PY -m build --wheel --outdir /io/dist-raw/
              auditwheel repair /io/dist-raw/*.whl -w /io/dist/
            "

      - uses: actions/upload-artifact@v4
        with:
          name: wheel-linux-aarch64-musl
          path: dist/*.whl

  # ── Windows AMD64 ────────────────────────────────────────────────────────
  build-win-amd64:
    name: "windows amd64"
    runs-on: [self-hosted, Windows, X64]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Build wheel
        shell: powershell
        run: |
          $py37 = "C:\python37\python.exe"
          & $py37 -m pip install build --quiet
          & $py37 -m build --wheel --outdir dist\

      - uses: actions/upload-artifact@v4
        with:
          name: wheel-win-amd64
          path: dist/*.whl

  # ── Windows ARM64 ────────────────────────────────────────────────────────
  build-win-arm64:
    name: "windows arm64"
    runs-on: [self-hosted, Windows, X64]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Build wheel
        shell: powershell
        run: |
          $py37 = "C:\python37\python.exe"
          & $py37 -m pip install build --quiet
          & $py37 -m build --wheel --outdir dist\

      - uses: actions/upload-artifact@v4
        with:
          name: wheel-win-arm64
          path: dist/*.whl

  # ── macOS universal2 ─────────────────────────────────────────────────────
  build-macos-universal2:
    name: "macos universal2"
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Build universal2 wheel
        run: |
          pip install build
          ARCHFLAGS="-arch x86_64 -arch arm64" \
          _PYTHON_HOST_PLATFORM="macosx-11.0-universal2" \
          python -m build --wheel --outdir dist/

      - uses: actions/upload-artifact@v4
        with:
          name: wheel-macos-universal2
          path: dist/*.whl

  # ── noarch + sdist ───────────────────────────────────────────────────────
  build-noarch:
    name: "noarch + sdist"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build noarch wheel + sdist
        run: |
          pip install build
          OMNIPKG_SKIP_C_EXT=1 python -m build --outdir dist/

      - uses: actions/upload-artifact@v4
        with:
          name: wheel-noarch
          path: dist/

  # ── Publish ──────────────────────────────────────────────────────────────
  publish:
    name: "Publish to PyPI"
    needs:
      - build-linux-x86_64-glibc
      - build-linux-aarch64-glibc
      - build-linux-x86_64-musl
      - build-linux-aarch64-musl
      - build-win-amd64
      - build-win-arm64
      - build-macos-universal2
      - build-noarch
    runs-on: ubuntu-latest
    environment: pypi
    if: |
      !cancelled() &&
      needs.build-noarch.result == 'success'
    permissions:
      id-token: write
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: wheel-*
          path: dist/
          merge-multiple: true

      - name: List
        run: ls -lh dist/

      - name: Upload to GitHub Release
        if: startsWith(inputs.tag, 'v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          files: dist/*.whl
          fail_on_unmatched_files: false

      - name: Publish to PyPI
        if: startsWith(inputs.tag, 'v')
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          skip-existing: true
