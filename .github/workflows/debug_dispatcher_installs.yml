name: Test Python Adoption + 8pkg Install

on:
  push:
    branches:
      - development
  workflow_dispatch:

jobs:
  test-adopt-and-install:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install uv (fast installer)
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install omnipkg via uv
        run: |
          uv pip install --upgrade omnipkg

      - name: Adopt Python ${{ matrix.python }}
        run: |
          8pkg python adopt ${{ matrix.python }}
          8pkg info python | grep -A 3 "Python ${{ matrix.python }}"

      - name: Install rich using 8pkg${{ matrix.python }}
        run: |
          cmd_version=$(echo "${{ matrix.python }}" | tr -d '.')
          echo "Running: 8pkg${cmd_version} install rich==13.7.1"
          8pkg${cmd_version} install rich==13.7.1

      - name: Verify rich version
        run: |
          cmd_version=$(echo "${{ matrix.python }}" | tr -d '.')
          8pkg${cmd_version} run python -c "
          import rich
          from importlib.metadata import version
          print('rich version:', version('rich'))
          print('rich location:', rich.__file__)
          "

      - name: Show daemon status (if running)
        run: |
          8pkg daemon status || echo "Daemon not running (expected)"