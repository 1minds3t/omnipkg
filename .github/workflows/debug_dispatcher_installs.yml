name: Test Python Adoption + 8pkg Install

on:
  push:
    branches:
      - development           # ← auto-runs ONLY on development pushes
  workflow_dispatch:          # ← manual trigger allowed on ANY branch (incl. main)

jobs:
  test-adopt-and-install:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install uv (fast installer)
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      # ────────────────────────────────────────────────
      #  Create venv + activate it → fixes uv venv error
      # ────────────────────────────────────────────────
      - name: Create and activate virtual environment
        run: |
          uv venv .venv
          echo "VIRTUAL_ENV=$PWD/.venv" >> $GITHUB_ENV
          echo "$PWD/.venv/bin" >> $GITHUB_PATH
          # Verify activation
          which python
          python --version

      - name: Upgrade pip and install omnipkg in venv
        run: |
          uv pip install --upgrade pip
          uv pip install omnipkg

      - name: Adopt Python ${{ matrix.python }}
        run: |
          8pkg python adopt ${{ matrix.python }}
          8pkg info python | grep -A 3 "Python ${{ matrix.python }}" || echo "Adoption check failed (non-fatal)"

      - name: Install rich using 8pkg${{ matrix.python }}
        run: |
          cmd_version=$(echo "${{ matrix.python }}" | tr -d '.')
          echo "Running: 8pkg${cmd_version} install rich==13.7.1"
          8pkg${cmd_version} install rich==13.7.1

      - name: Verify rich version in adopted environment
        run: |
          cmd_version=$(echo "${{ matrix.python }}" | tr -d '.')
          8pkg${cmd_version} run python -c "
import rich
from importlib.metadata import version
print('rich version:', version('rich'))
print('rich location:', rich.__file__)
"

      - name: Show daemon status (non-fatal)
        run: |
          8pkg daemon status || echo "Daemon not running (normal in CI)"