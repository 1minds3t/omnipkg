name: Build Platform-Specific Wheels (Atomic Matrix)

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to build wheels for (e.g., v2.0.7)'
        required: true
        type: string
      python_versions:
        description: 'Python versions (comma-separated, e.g., "3.8,3.9,3.10,3.11,3.12,3.13,3.14")'
        required: false
        default: '3.7,3.8,3.9,3.10,3.11,3.12,3.13,3.14,3.15'
        type: string
      upload_to_pypi:
        description: 'Upload wheels to PyPI?'
        required: false
        default: true
        type: boolean

permissions:
  contents: write
  id-token: write

jobs:
  build-wheels:
    # We split the input string into a matrix
    name: "Wheels | ${{ matrix.platform }} | Py${{ matrix.python }}"
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        # 1. Define all Platforms
        platform: [
          linux_x86_64, linux_i686, linux_aarch64, linux_ppc64le, linux_s390x, linux_riscv64,
          macos_x86_64, macos_arm64,
          win_amd64, win_arm64
        ]
        # 2. Define all Python versions
        # We use a fixed list here because GHA matrixes cannot be 
        # dynamically generated from a string input easily.
        python: ["3.7", "3.8", "3.9", "3.10", "3.11", "3.12", "3.13", "3.14", "3.15"]
        
        # Map platforms to runners and archs
        include:
          - platform: linux_x86_64  { runner: ubuntu-latest, cibw_archs: x86_64, use_qemu: false }
          - platform: linux_i686    { runner: ubuntu-latest, cibw_archs: i686, use_qemu: true }
          - platform: linux_aarch64 { runner: ubuntu-latest, cibw_archs: aarch64, use_qemu: true }
          - platform: linux_ppc64le { runner: ubuntu-latest, cibw_archs: ppc64le, use_qemu: true }
          - platform: linux_s390x   { runner: ubuntu-latest, cibw_archs: s390x, use_qemu: true }
          - platform: linux_riscv64 { runner: ubuntu-latest, cibw_archs: riscv64, use_qemu: true }
          - platform: macos_x86_64  { runner: macos-13, cibw_archs: x86_64, use_qemu: false }
          - platform: macos_arm64   { runner: macos-14, cibw_archs: arm64, use_qemu: false }
          - platform: win_amd64     { runner: windows-latest, cibw_archs: AMD64, use_qemu: false }
          - platform: win_arm64     { runner: windows-latest, cibw_archs: ARM64, use_qemu: false }

    # Overriding matrix since we used a custom mapping in 'include'
    # We must define these specifically for the 'include' block to work
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout at release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.release_tag }}

      - name: Set up QEMU (Linux cross-arch only)
        if: matrix.use_qemu == true
        uses: docker/setup-qemu-action@v3
        with:
          platforms: all

      - name: Build ONE specific wheel via cibuildwheel
        uses: pypa/cibuildwheel@v2.20.0
        env:
          CIBW_ENVIRONMENT: "OMNIPKG_SKIP_C_EXT=0"
          CIBW_BUILD_VERBOSITY: 1
          
          # 🟢 THE FIX: Target exactly ONE python version
          # Example: if matrix.python is "3.11", CIBW_BUILD becomes "cp311-*"
          CIBW_BUILD: cp${{ replace(matrix.python, '.', '') }}-*
          
          CIBW_TEST_COMMAND: >
            (python -c "import omnipkg.isolation.omnipkg_atomic" >/dev/null 2>&1 && echo "✅ Hardware Atomics: ENABLED" || echo "⚠️ Hardware Atomics: DISABLED (Using Python Fallback)") &&
            omnipkg --version &&
            omnipkg list
          
          CIBW_ARCHS: ${{ matrix.cibw_archs }}
          CIBW_SKIP: "pp*"

      - name: Upload wheel as artifact
        uses: actions/upload-artifact@v4
        with:
          # Unique name for every single combination
          name: wheels-${{ matrix.platform }}-py${{ matrix.python }}
          path: ./wheelhouse/*.whl
          if-no-files-found: warn

  publish-wheels:
    name: "Publish wheels to PyPI"
    needs: build-wheels
    runs-on: ubuntu-latest
    if: always() && inputs.upload_to_pypi == true
    environment: pypi
    steps:
      - name: Download all wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: all-wheels
          merge-multiple: true
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          packages-dir: all-wheels/
          skip-existing: true

  update-release:
    name: "Attach wheels to GitHub Release"
    needs: build-wheels
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Download all wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: all-wheels
          merge-multiple: true
      - name: Upload wheels to GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ inputs.release_tag }}
          files: all-wheels/*.whl
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
