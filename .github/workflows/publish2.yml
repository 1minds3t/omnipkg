name: Build Platform-Specific Wheels (Explicit Matrix)

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to build wheels for (e.g., v2.0.7)'
        required: true
        type: string
      upload_to_pypi:
        description: 'Upload wheels to PyPI?'
        required: false
        default: true
        type: boolean

permissions:
  contents: write
  id-token: write

jobs:
  build-wheels:
    name: "Wheels | ${{ matrix.platform }} | Py${{ matrix.py_ver }}"
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          # --- LINUX x86_64 ---
          - { platform: linux_x86_64, py_ver: "3.7", py_tag: "cp37", runner: ubuntu-latest, cibw_archs: x86_64, use_qemu: false }
          - { platform: linux_x86_64, py_ver: "3.8", py_tag: "cp38", runner: ubuntu-latest, cibw_archs: x86_64, use_qemu: false }
          - { platform: linux_x86_64, py_ver: "3.9", py_tag: "cp39", runner: ubuntu-latest, cibw_archs: x86_64, use_qemu: false }
          - { platform: linux_x86_64, py_ver: "3.10", py_tag: "cp310", runner: ubuntu-latest, cibw_archs: x86_64, use_qemu: false }
          - { platform: linux_x86_64, py_ver: "3.11", py_tag: "cp311", runner: ubuntu-latest, cibw_archs: x86_64, use_qemu: false }
          - { platform: linux_x86_64, py_ver: "3.12", py_tag: "cp312", runner: ubuntu-latest, cibw_archs: x86_64, use_qemu: false }
          - { platform: linux_x86_64, py_ver: "3.13", py_tag: "cp313", runner: ubuntu-latest, cibw_archs: x86_64, use_qemu: false }
          - { platform: linux_x86_64, py_ver: "3.14", py_tag: "cp314", runner: ubuntu-latest, cibw_archs: x86_64, use_qemu: false }
          - { platform: linux_x86_64, py_ver: "3.15", py_tag: "cp315", runner: ubuntu-latest, cibw_archs: x86_64, use_qemu: false }

          # --- LINUX ARM64 ---
          - { platform: linux_aarch64, py_ver: "3.7", py_tag: "cp37", runner: ubuntu-latest, cibw_archs: aarch64, use_qemu: true }
          - { platform: linux_aarch64, py_ver: "3.8", py_tag: "cp38", runner: ubuntu-latest, cibw_archs: aarch64, use_qemu: true }
          - { platform: linux_aarch64, py_ver: "3.9", py_tag: "cp39", runner: ubuntu-latest, cibw_archs: aarch64, use_qemu: true }
          - { platform: linux_aarch64, py_ver: "3.10", py_tag: "cp310", runner: ubuntu-latest, cibw_archs: aarch64, use_qemu: true }
          - { platform: linux_aarch64, py_ver: "3.11", py_tag: "cp311", runner: ubuntu-latest, cibw_archs: aarch64, use_qemu: true }
          - { platform: linux_aarch64, py_ver: "3.12", py_tag: "cp312", runner: ubuntu-latest, cibw_archs: aarch64, use_qemu: true }
          - { platform: linux_aarch64, py_ver: "3.13", py_tag: "cp313", runner: ubuntu-latest, cibw_archs: aarch64, use_qemu: true }
          - { platform: linux_aarch64, py_ver: "3.14", py_tag: "cp314", runner: ubuntu-latest, cibw_archs: aarch64, use_qemu: true }
          - { platform: linux_aarch64, py_ver: "3.15", py_tag: "cp315", runner: ubuntu-latest, cibw_archs: aarch64, use_qemu: true }

          # --- LINUX ARMv7 ---
          - { platform: linux_armv7, py_ver: "3.7", py_tag: "cp37", runner: ubuntu-latest, cibw_archs: armv7, use_qemu: true }
          - { platform: linux_armv7, py_ver: "3.8", py_tag: "cp38", runner: ubuntu-latest, cibw_archs: armv7, use_qemu: true }
          - { platform: linux_armv7, py_ver: "3.9", py_tag: "cp39", runner: ubuntu-latest, cibw_archs: armv7, use_qemu: true }
          - { platform: linux_armv7, py_ver: "3.10", py_tag: "cp310", runner: ubuntu-latest, cibw_archs: armv7, use_qemu: true }
          - { platform: linux_armv7, py_ver: "3.11", py_tag: "cp311", runner: ubuntu-latest, cibw_archs: armv7, use_qemu: true }
          - { platform: linux_armv7, py_ver: "3.12", py_tag: "cp312", runner: ubuntu-latest, cibw_archs: armv7, use_qemu: true }
          - { platform: linux_armv7, py_ver: "3.13", py_tag: "cp313", runner: ubuntu-latest, cibw_archs: armv7, use_qemu: true }
          - { platform: linux_armv7, py_ver: "3.14", py_tag: "cp314", runner: ubuntu-latest, cibw_archs: armv7, use_qemu: true }
          - { platform: linux_armv7, py_ver: "3.15", py_tag: "cp315", runner: ubuntu-latest, cibw_archs: armv7, use_qemu: true }

          # --- LINUX ppc64le ---
          - { platform: linux_ppc64le, py_ver: "3.7", py_tag: "cp37", runner: ubuntu-latest, cibw_archs: ppc64le, use_qemu: true }
          - { platform: linux_ppc64le, py_ver: "3.8", py_tag: "cp38", runner: ubuntu-latest, cibw_archs: ppc64le, use_qemu: true }
          - { platform: linux_ppc64le, py_ver: "3.9", py_tag: "cp39", runner: ubuntu-latest, cibw_archs: ppc64le, use_qemu: true }
          - { platform: linux_ppc64le, py_ver: "3.10", py_tag: "cp310", runner: ubuntu-latest, cibw_archs: ppc64le, use_qemu: true }
          - { platform: linux_ppc64le, py_ver: "3.11", py_tag: "cp311", runner: ubuntu-latest, cibw_archs: ppc64le, use_qemu: true }
          - { platform: linux_ppc64le, py_ver: "3.12", py_tag: "cp312", runner: ubuntu-latest, cibw_archs: ppc64le, use_qemu: true }
          - { platform: linux_ppc64le, py_ver: "3.13", py_tag: "cp313", runner: ubuntu-latest, cibw_archs: ppc64le, use_qemu: true }
          - { platform: linux_ppc64le, py_ver: "3.14", py_tag: "cp314", runner: ubuntu-latest, cibw_archs: ppc64le, use_qemu: true }
          - { platform: linux_ppc64le, py_ver: "3.15", py_tag: "cp315", runner: ubuntu-latest, cibw_archs: ppc64le, use_qemu: true }

          # --- LINUX s390x ---
          - { platform: linux_s390x, py_ver: "3.7", py_tag: "cp37", runner: ubuntu-latest, cibw_archs: s390x, use_qemu: true }
          - { platform: linux_s390x, py_ver: "3.8", py_tag: "cp38", runner: ubuntu-latest, cibw_archs: s390x, use_qemu: true }
          - { platform: linux_s390x, py_ver: "3.9", py_tag: "cp39", runner: ubuntu-latest, cibw_archs: s390x, use_qemu: true }
          - { platform: linux_s390x, py_ver: "3.10", py_tag: "cp310", runner: ubuntu-latest, cibw_archs: s390x, use_qemu: true }
          - { platform: linux_s390x, py_ver: "3.11", py_tag: "cp311", runner: ubuntu-latest, cibw_archs: s390x, use_qemu: true }
          - { platform: linux_s390x, py_ver: "3.12", py_tag: "cp312", runner: ubuntu-latest, cibw_archs: s390x, use_qemu: true }
          - { platform: linux_s390x, py_ver: "3.13", py_tag: "cp313", runner: ubuntu-latest, cibw_archs: s390x, use_qemu: true }
          - { platform: linux_s390x, py_ver: "3.14", py_tag: "cp314", runner: ubuntu-latest, cibw_archs: s390x, use_qemu: true }
          - { platform: linux_s390x, py_ver: "3.15", py_tag: "cp315", runner: ubuntu-latest, cibw_archs: s390x, use_qemu: true }

          # --- LINUX riscv64 ---
          - { platform: linux_riscv64, py_ver: "3.7", py_tag: "cp37", runner: ubuntu-latest, cibw_archs: riscv64, use_qemu: true }
          - { platform: linux_riscv64, py_ver: "3.8", py_tag: "cp38", runner: ubuntu-latest, cibw_archs: riscv64, use_qemu: true }
          - { platform: linux_riscv64, py_ver: "3.9", py_tag: "cp39", runner: ubuntu-latest, cibw_archs: riscv64, use_qemu: true }
          - { platform: linux_riscv64, py_ver: "3.10", py_tag: "cp310", runner: ubuntu-latest, cibw_archs: riscv64, use_qemu: true }
          - { platform: linux_riscv64, py_ver: "3.11", py_tag: "cp311", runner: ubuntu-latest, cibw_archs: riscv64, use_qemu: true }
          - { platform: linux_riscv64, py_ver: "3.12", py_tag: "cp312", runner: ubuntu-latest, cibw_archs: riscv64, use_qemu: true }
          - { platform: linux_riscv64, py_ver: "3.13", py_tag: "cp313", runner: ubuntu-latest, cibw_archs: riscv64, use_qemu: true }
          - { platform: linux_riscv64, py_ver: "3.14", py_tag: "cp314", runner: ubuntu-latest, cibw_archs: riscv64, use_qemu: true }
          - { platform: linux_riscv64, py_ver: "3.15", py_tag: "cp315", runner: ubuntu-latest, cibw_archs: riscv64, use_qemu: true }

          # --- LINUX i686 ---
          - { platform: linux_i686, py_ver: "3.7", py_tag: "cp37", runner: ubuntu-latest, cibw_archs: i686, use_qemu: true }
          - { platform: linux_i686, py_ver: "3.8", py_tag: "cp38", runner: ubuntu-latest, cibw_archs: i686, use_qemu: true }
          - { platform: linux_i686, py_ver: "3.9", py_tag: "cp39", runner: ubuntu-latest, cibw_archs: i686, use_qemu: true }
          - { platform: linux_i686, py_ver: "3.10", py_tag: "cp310", runner: ubuntu-latest, cibw_archs: i686, use_qemu: true }
          - { platform: linux_i686, py_ver: "3.11", py_tag: "cp311", runner: ubuntu-latest, cibw_archs: i686, use_qemu: true }
          - { platform: linux_i686, py_ver: "3.12", py_tag: "cp312", runner: ubuntu-latest, cibw_archs: i686, use_qemu: true }
          - { platform: linux_i686, py_ver: "3.13", py_tag: "cp313", runner: ubuntu-latest, cibw_archs: i686, use_qemu: true }
          - { platform: linux_i686, py_ver: "3.14", py_tag: "cp314", runner: ubuntu-latest, cibw_archs: i686, use_qemu: true }
          - { platform: linux_i686, py_ver: "3.15", py_tag: "cp315", runner: ubuntu-latest, cibw_archs: i686, use_qemu: true }

          # --- macOS x86_64 ---
          - { platform: macos_x86_64, py_ver: "3.7", py_tag: "cp37", runner: macos-13, cibw_archs: x86_64, use_qemu: false }
          - { platform: macos_x86_64, py_ver: "3.8", py_tag: "cp38", runner: macos-13, cibw_archs: x86_64, use_qemu: false }
          - { platform: macos_x86_64, py_ver: "3.9", py_tag: "cp39", runner: macos-13, cibw_archs: x86_64, use_qemu: false }
          - { platform: macos_x86_64, py_ver: "3.10", py_tag: "cp310", runner: macos-13, cibw_archs: x86_64, use_qemu: false }
          - { platform: macos_x86_64, py_ver: "3.11", py_tag: "cp311", runner: macos-13, cibw_archs: x86_64, use_qemu: false }
          - { platform: macos_x86_64, py_ver: "3.12", py_tag: "cp312", runner: macos-13, cibw_archs: x86_64, use_qemu: false }
          - { platform: macos_x86_64, py_ver: "3.13", py_tag: "cp313", runner: macos-13, cibw_archs: x86_64, use_qemu: false }
          - { platform: macos_x86_64, py_ver: "3.14", py_tag: "cp314", runner: macos-13, cibw_archs: x86_64, use_qemu: false }
          - { platform: macos_x86_64, py_ver: "3.15", py_tag: "cp315", runner: macos-13, cibw_archs: x86_64, use_qemu: false }

          # --- macOS ARM64 ---
          - { platform: macos_arm64, py_ver: "3.7", py_tag: "cp37", runner: macos-14, cibw_archs: arm64, use_qemu: false }
          - { platform: macos_arm64, py_ver: "3.8", py_tag: "cp38", runner: macos-14, cibw_archs: arm64, use_qemu: false }
          - { platform: macos_arm64, py_ver: "3.9", py_tag: "cp39", runner: macos-14, cibw_archs: arm64, use_qemu: false }
          - { platform: macos_arm64, py_ver: "3.10", py_tag: "cp310", runner: macos-14, cibw_archs: arm64, use_qemu: false }
          - { platform: macos_arm64, py_ver: "3.11", py_tag: "cp311", runner: macos-14, cibw_archs: arm64, use_qemu: false }
          - { platform: macos_arm64, py_ver: "3.12", py_tag: "cp312", runner: macos-14, cibw_archs: arm64, use_qemu: false }
          - { platform: macos_arm64, py_ver: "3.13", py_tag: "cp313", runner: macos-14, cibw_archs: arm64, use_qemu: false }
          - { platform: macos_arm64, py_ver: "3.14", py_tag: "cp314", runner: macos-14, cibw_archs: arm64, use_qemu: false }
          - { platform: macos_arm64, py_ver: "3.15", py_tag: "cp315", runner: macos-14, cibw_archs: arm64, use_qemu: false }

          # --- WINDOWS x64 ---
          - { platform: win_amd64, py_ver: "3.7", py_tag: "cp37", runner: windows-latest, cibw_archs: AMD64, use_qemu: false }
          - { platform: win_amd64, py_ver: "3.8", py_tag: "cp38", runner: windows-latest, cibw_archs: AMD64, use_qemu: false }
          - { platform: win_amd64, py_ver: "3.9", py_tag: "cp39", runner: windows-latest, cibw_archs: AMD64, use_qemu: false }
          - { platform: win_amd64, py_ver: "3.10", py_tag: "cp310", runner: windows-latest, cibw_archs: AMD64, use_qemu: false }
          - { platform: win_amd64, py_ver: "3.11", py_tag: "cp311", runner: windows-latest, cibw_archs: AMD64, use_qemu: false }
          - { platform: win_amd64, py_ver: "3.12", py_tag: "cp312", runner: windows-latest, cibw_archs: AMD64, use_qemu: false }
          - { platform: win_amd64, py_ver: "3.13", py_tag: "cp313", runner: windows-latest, cibw_archs: AMD64, use_qemu: false }
          - { platform: win_amd64, py_ver: "3.14", py_tag: "cp314", runner: windows-latest, cibw_archs: AMD64, use_qemu: false }
          - { platform: win_amd64, py_ver: "3.15", py_tag: "cp315", runner: windows-latest, cibw_archs: AMD64, use_qemu: false }

          # --- WINDOWS ARM64 ---
          - { platform: win_arm64, py_ver: "3.7", py_tag: "cp37", runner: windows-latest, cibw_archs: ARM64, use_qemu: false }
          - { platform: win_arm64, py_ver: "3.8", py_tag: "cp38", runner: windows-latest, cibw_archs: ARM64, use_qemu: false }
          - { platform: win_arm64, py_ver: "3.9", py_tag: "cp39", runner: windows-latest, cibw_archs: ARM64, use_qemu: false }
          - { platform: win_arm64, py_ver: "3.10", py_tag: "cp310", runner: windows-latest, cibw_archs: ARM64, use_qemu: false }
          - { platform: win_arm64, py_ver: "3.11", py_tag: "cp311", runner: windows-latest, cibw_archs: ARM64, use_qemu: false }
          - { platform: win_arm64, py_ver: "3.12", py_tag: "cp312", runner: windows-latest, cibw_archs: ARM64, use_qemu: false }
          - { platform: win_arm64, py_ver: "3.13", py_tag: "cp313", runner: windows-latest, cibw_archs: ARM64, use_qemu: false }
          - { platform: win_arm64, py_ver: "3.14", py_tag: "cp314", runner: windows-latest, cibw_archs: ARM64, use_qemu: false }
          - { platform: win_arm64, py_ver: "3.15", py_tag: "cp315", runner: windows-latest, cibw_archs: ARM64, use_qemu: false }

          # --- WINDOWS 32-bit ---
          - { platform: win32, py_ver: "3.7", py_tag: "cp37", runner: windows-latest, cibw_archs: Win32, use_qemu: false }
          - { platform: win32, py_ver: "3.8", py_tag: "cp38", runner: windows-latest, cibw_archs: Win32, use_qemu: false }
          - { platform: win32, py_ver: "3.9", py_tag: "cp39", runner: windows-latest, cibw_archs: Win32, use_qemu: false }
          - { platform: win32, py_ver: "3.10", py_tag: "cp310", runner: windows-latest, cibw_archs: Win32, use_qemu: false }
          - { platform: win32, py_ver: "3.11", py_tag: "cp311", runner: windows-latest, cibw_archs: Win32, use_qemu: false }
          - { platform: win32, py_ver: "3.12", py_tag: "cp312", runner: windows-latest, cibw_archs: Win32, use_qemu: false }
          - { platform: win32, py_ver: "3.13", py_tag: "cp313", runner: windows-latest, cibw_archs: Win32, use_qemu: false }
          - { platform: win32, py_ver: "3.14", py_tag: "cp314", runner: windows-latest, cibw_archs: Win32, use_qemu: false }
          - { platform: win32, py_ver: "3.15", py_tag: "cp315", runner: windows-latest, cibw_archs: Win32, use_qemu: false }
    steps:
      - name: Checkout at release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.release_tag }}

      - name: Set up QEMU (Linux cross-arch only)
        if: matrix.use_qemu == true
        uses: docker/setup-qemu-action@v3
        with:
          platforms: all

      - name: Build ONE specific wheel via cibuildwheel
        uses: pypa/cibuildwheel@v2.20.0
        env:
          CIBW_ENVIRONMENT: "OMNIPKG_SKIP_C_EXT=0"
          CIBW_PRERELEASE_PYTHONS: "1"
          CIBW_BUILD: ${{ matrix.py_tag }}-*
          CIBW_ARCHS: ${{ matrix.cibw_archs }}
          CIBW_SKIP: "pp*"
          CIBW_TEST_COMMAND: "omnipkg --version"

      - name: Upload wheel as artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.platform }}-py${{ matrix.py_ver }}
          path: ./wheelhouse/*.whl
          if-no-files-found: warn

  publish-wheels:
    name: "Publish wheels to PyPI"
    needs: build-wheels
    runs-on: ubuntu-latest
    if: always() && inputs.upload_to_pypi == true
    environment: pypi
    steps:
      - name: Download all wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: all-wheels
          merge-multiple: true
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          packages-dir: all-wheels/
          skip-existing: true
