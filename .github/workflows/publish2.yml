name: Build Platform-Specific Wheels for Existing Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to build wheels for (e.g., v2.0.7)'
        required: true
        type: string
      python_versions:
        description: 'Python versions to build (space-separated, e.g., "3.8 3.9 3.10 3.11 3.12 3.13 3.14 3.15")'
        required: false
        default: '3.10 3.11 3.12 3.13'
        type: string
      upload_to_pypi:
        description: 'Upload wheels to PyPI?'
        required: false
        default: true
        type: boolean

permissions:
  contents: write
  id-token: write

jobs:
  build-wheels:
    name: "Wheels | ${{ matrix.platform }}"
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 120 # Increased for QEMU targets
    strategy:
      fail-fast: false 
      matrix:
        include:
          # ─────────────────────────────────────────────────────────
          # LINUX TARGETS
          # ─────────────────────────────────────────────────────────
          - runner: ubuntu-latest
            platform: linux_x86_64
            cibw_archs: x86_64
          - runner: ubuntu-latest
            platform: linux_i686
            cibw_archs: i686
            use_qemu: true
          - runner: ubuntu-latest
            platform: linux_aarch64
            cibw_archs: aarch64
            use_qemu: true
          - runner: ubuntu-latest
            platform: linux_ppc64le
            cibw_archs: ppc64le
            use_qemu: true
          - runner: ubuntu-latest
            platform: linux_s390x
            cibw_archs: s390x
            use_qemu: true
          - runner: ubuntu-latest
            platform: linux_riscv64
            cibw_archs: riscv64
            use_qemu: true

          # ─────────────────────────────────────────────────────────
          # macOS TARGETS
          # ─────────────────────────────────────────────────────────
          - runner: macos-13
            platform: macos_x86_64
            cibw_archs: x86_64
          - runner: macos-14
            platform: macos_arm64
            cibw_archs: arm64

          # ─────────────────────────────────────────────────────────
          # WINDOWS TARGETS
          # ─────────────────────────────────────────────────────────
          - runner: windows-latest
            platform: win_amd64
            cibw_archs: AMD64
          - runner: windows-latest
            platform: win_arm64
            cibw_archs: ARM64

    steps:
      - name: Checkout at release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.release_tag }}

      - name: Set up QEMU (Linux cross-arch only)
        if: matrix.use_qemu == true
        uses: docker/setup-qemu-action@v3
        with:
          platforms: all

      - name: Compute CIBW_BUILD pattern
        shell: bash
        run: |
          PATTERN=""
          for ver in ${{ inputs.python_versions }}; do
            tag="cp$(echo $ver | tr -d '.')-*"
            PATTERN="$PATTERN $tag"
          done
          PATTERN="${PATTERN# }"
          echo "CIBW_BUILD=$PATTERN" >> $GITHUB_ENV
          echo "Will build for: $PATTERN"

      - name: Build wheels via cibuildwheel
        # 🟢 THE MAGIC FIX: This prevents the whole job from failing 
        # if one Python version (like 3.8 on Mac ARM) crashes.
        continue-on-error: true 
        uses: pypa/cibuildwheel@v2.20.0
        env:
          CIBW_ENVIRONMENT: "OMNIPKG_SKIP_C_EXT=0"
          CIBW_BUILD_VERBOSITY: 1
          CIBW_TEST_ENVIRONMENT: "OMNIPKG_DEBUG=1"
          CIBW_TEST_COMMAND: >
            (python -c "import omnipkg.isolation.omnipkg_atomic" >/dev/null 2>&1 && echo "✅ Hardware Atomics: ENABLED" || echo "⚠️ Hardware Atomics: DISABLED (Using Python Fallback)") &&
            omnipkg --version &&
            omnipkg list
          CIBW_ARCHS: ${{ matrix.cibw_archs }}
          CIBW_BUILD: ${{ env.CIBW_BUILD }}
          CIBW_SKIP: "pp*"

      - name: Upload wheels as artifacts
        # This will now run even if the build step had "errors"
        # and will upload whatever wheels were successfully created.
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.platform }}
          path: ./wheelhouse/*.whl
          if-no-files-found: warn
          retention-days: 7

  publish-wheels:
    name: "Publish wheels to PyPI"
    needs: build-wheels
    runs-on: ubuntu-latest
    if: always() && inputs.upload_to_pypi == true
    environment: pypi
    steps:
      - name: Download all wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: all-wheels
          merge-multiple: true
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          packages-dir: all-wheels/
          skip-existing: true

  update-release:
    name: "Attach wheels to GitHub Release"
    needs: build-wheels
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Download all wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: all-wheels
          merge-multiple: true
      - name: Upload wheels to GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ inputs.release_tag }}
          files: all-wheels/*.whl
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
