name: Build Platform-Specific Wheels for Existing Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to build wheels for (e.g., v2.0.7)'
        required: true
        type: string
      python_versions:
        description: 'Python versions to build (space-separated, e.g., "3.10 3.11 3.12 3.13")'
        required: false
        default: '3.10 3.11 3.12 3.13'
        type: string
      upload_to_pypi:
        description: 'Upload wheels to PyPI?'
        required: false
        default: true
        type: boolean

permissions:
  contents: write
  id-token: write

jobs:
  # ═══════════════════════════════════════════════════════════════════
  # JOB 1: Build wheels for all platforms via cibuildwheel
  #
  # cibuildwheel handles ALL Python version management automatically —
  # no manual Docker runs, no manylinux path maps, no auditwheel calls.
  # It also builds musllinux (Alpine) wheels alongside manylinux.
  # ═══════════════════════════════════════════════════════════════════
  build-wheels:
    name: "Wheels | ${{ matrix.platform }}"
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    strategy:
      fail-fast: false   # Keep going — one failing arch won't block others
      matrix:
        include:
          # ─────────────────────────────────────────────────────────
          # Linux x86_64  (manylinux + musllinux/Alpine)
          # ─────────────────────────────────────────────────────────
          - runner: ubuntu-latest
            platform: linux_x86_64
            cibw_archs: x86_64

          # ─────────────────────────────────────────────────────────
          # Linux ARM64 — QEMU cross-compile  (manylinux + musllinux)
          # ─────────────────────────────────────────────────────────
          - runner: ubuntu-latest
            platform: linux_aarch64
            cibw_archs: aarch64
            use_qemu: true

          # ─────────────────────────────────────────────────────────
          # Linux ppc64le — QEMU cross-compile
          # Known to be slow/flaky. Kept in matrix but publish jobs
          # use if: always() so a failure here never blocks PyPI.
          # ─────────────────────────────────────────────────────────
          - runner: ubuntu-latest
            platform: linux_ppc64le
            cibw_archs: ppc64le
            use_qemu: true

          # ─────────────────────────────────────────────────────────
          # macOS Intel x86_64
          # ─────────────────────────────────────────────────────────
          - runner: macos-13
            platform: macos_x86_64
            cibw_archs: x86_64

          # ─────────────────────────────────────────────────────────
          # macOS Apple Silicon ARM64
          # ─────────────────────────────────────────────────────────
          - runner: macos-14
            platform: macos_arm64
            cibw_archs: arm64

          # ─────────────────────────────────────────────────────────
          # Windows x86_64
          # ─────────────────────────────────────────────────────────
          - runner: windows-latest
            platform: win_amd64
            cibw_archs: AMD64

          # ─────────────────────────────────────────────────────────
          # Windows ARM64 — Copilot+ / Snapdragon PCs
          # Cross-compiled on x86_64 runner, no special runner needed.
          # ─────────────────────────────────────────────────────────
          - runner: windows-latest
            platform: win_arm64
            cibw_archs: ARM64

    steps:
      - name: Checkout at release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.release_tag }}

      - name: Set up QEMU (Linux cross-arch only)
        if: matrix.use_qemu == true
        uses: docker/setup-qemu-action@v3
        with:
          platforms: all

      # Convert "3.10 3.11 3.12 3.13" → "cp310-* cp311-* cp312-* cp313-*"
      # GHA expression syntax can't do this transformation reliably so we
      # do it in shell and write the result to GITHUB_ENV.
      - name: Compute CIBW_BUILD pattern
        shell: bash
        run: |
          PATTERN=""
          for ver in ${{ inputs.python_versions }}; do
            tag="cp$(echo $ver | tr -d '.')-*"
            PATTERN="$PATTERN $tag"
          done
          PATTERN="${PATTERN# }"  # strip leading space
          echo "CIBW_BUILD=$PATTERN" >> $GITHUB_ENV
          echo "Will build for: $PATTERN"

      - name: Build wheels via cibuildwheel
        uses: pypa/cibuildwheel@v2.20.0
        env:
          CIBW_ARCHS: ${{ matrix.cibw_archs }}
          CIBW_BUILD: ${{ env.CIBW_BUILD }}

          # PyPy skipped — omnipkg targets CPython only.
          # musllinux NOT skipped — Alpine users get pre-built wheels
          # instead of needing gcc + musl-dev at install time.
          # If ppc64le musllinux fails, publish still runs via if: always().
          CIBW_SKIP: "pp*"

          # Smoke-test: C extension must import cleanly in the built wheel.
          CIBW_TEST_COMMAND: "python -c \"import omnipkg_atomic; print('omnipkg_atomic OK')\""

      - name: Upload wheels as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.platform }}
          path: ./wheelhouse/*.whl
          retention-days: 7

  # ═══════════════════════════════════════════════════════════════════
  # JOB 2: Publish to PyPI
  #
  # if: always() — runs even if ppc64le (or any other matrix job) failed.
  # skip-existing: true — safe to re-run; already-uploaded wheels are skipped.
  # ═══════════════════════════════════════════════════════════════════
  publish-wheels:
    name: "Publish wheels to PyPI"
    needs: build-wheels
    runs-on: ubuntu-latest
    if: always() && inputs.upload_to_pypi == true
    environment: pypi

    steps:
      - name: Download all wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: all-wheels
          merge-multiple: true

      - name: List wheels to be uploaded
        run: |
          echo "📦 Wheels collected for PyPI upload:"
          ls -lh all-wheels/*.whl
          echo ""
          echo "Total: $(ls -1 all-wheels/*.whl | wc -l) wheels"

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          packages-dir: all-wheels/
          skip-existing: true

      - name: Done
        run: |
          echo "🎉 Wheels published to PyPI for ${{ inputs.release_tag }}"
          echo "pip install omnipkg will now serve platform wheels for:"
          ls all-wheels/*.whl | sed 's/.*omnipkg-[^-]*-[^-]*-[^-]*-/  /' | sed 's/\.whl//'

  # ═══════════════════════════════════════════════════════════════════
  # JOB 3: Attach wheels to GitHub Release
  #
  # Also uses if: always() — a ppc64le failure won't orphan the artifacts.
  # ═══════════════════════════════════════════════════════════════════
  update-release:
    name: "Attach wheels to GitHub Release"
    needs: build-wheels
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Download all wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: all-wheels
          merge-multiple: true

      - name: Upload wheels to GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ inputs.release_tag }}
          files: all-wheels/*.whl
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Done
        run: echo "✅ Wheels attached to release ${{ inputs.release_tag }}"
